          ctx.beginPath(); ctx.moveTo(-10, wy); ctx.quadraticCurveTo(0, wy - 3, 10, wy); ctx.stroke();
        }
        // 第二形態: 頭に赤い呪紋
        if (b.phase === 2) {
          ctx.strokeStyle = "rgba(227,66,52,0.75)"; ctx.lineWidth = 2.4;
          ctx.beginPath(); ctx.moveTo(0, -112); ctx.lineTo(0, -88); ctx.stroke();
          ctx.beginPath(); ctx.arc(0, -80, 8, 0, Math.PI * 2); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(-14, -100); ctx.lineTo(-6, -92); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(14, -100); ctx.lineTo(6, -92); ctx.stroke();
        }
        // 白い後ろ髪と髷
        ctx.strokeStyle = fl ? "#fff" : "#dfd6c4"; ctx.lineWidth = 4; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(-18, -40); ctx.quadraticCurveTo(-28, -30, -26, -18); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(18, -40); ctx.quadraticCurveTo(28, -30, 26, -18); ctx.stroke();
        // 目(光線中は爛々と光る)
        const beaming = b.state === "beam" && b.st >= 45;
        if (beaming) {
          ctx.fillStyle = "#ffd23f";
          ctx.shadowColor = "#ffd23f"; ctx.shadowBlur = 14;
          ctx.beginPath(); ctx.arc(-8, -40, 4.5, 0, Math.PI * 2); ctx.arc(8, -40, 4.5, 0, Math.PI * 2); ctx.fill();
          ctx.shadowBlur = 0;
        } else {
          ctx.strokeStyle = "#181008"; ctx.lineWidth = 2.4; ctx.lineCap = "round";
          ctx.beginPath(); ctx.moveTo(-12, -40); ctx.lineTo(-4, -41); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(4, -41); ctx.lineTo(12, -40); ctx.stroke();
          if (b.phase === 2) {
            ctx.fillStyle = "#e34234";
            ctx.beginPath(); ctx.arc(-8, -40, 1.8, 0, Math.PI * 2); ctx.arc(8, -40, 1.8, 0, Math.PI * 2); ctx.fill();
          }
        }
        // 不敵な笑みと顎鬚
        ctx.strokeStyle = "#5a3a20"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-7, -28); ctx.quadraticCurveTo(0, -23, 7, -28); ctx.stroke();
        ctx.strokeStyle = "#dfd6c4"; ctx.lineWidth = 2.4;
        ctx.beginPath(); ctx.moveTo(0, -24); ctx.quadraticCurveTo(-2, -14, 0, -8); ctx.stroke();
        // 伸びる両腕(袖ごと伸びて薙ぐ)
        for (const arm of [b.a1, b.a2]) {
          if (!arm || arm.ext <= 0.02) continue;
          const alx = Math.cos(arm.ang) * 300 * arm.ext;
          const aly = Math.sin(arm.ang) * 300 * arm.ext;
          ctx.strokeStyle = fl ? "#f0e6d2" : "#1a2430";
          ctx.lineWidth = 15; ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(0, -6);
          ctx.quadraticCurveTo(alx * 0.5, aly * 0.5 - 6 + Math.sin(b.ph * 5) * 9 * arm.ext, alx, aly - 6);
          ctx.stroke();
          // 袖口から覗く痩せた手と金の爪
          ctx.strokeStyle = fl ? "#f0e6d2" : "#e8d9c0";
          ctx.lineWidth = 6;
          ctx.beginPath();
          ctx.moveTo(alx - Math.cos(arm.ang) * 20, aly - 6 - Math.sin(arm.ang) * 20);
          ctx.lineTo(alx, aly - 6);
          ctx.stroke();
          ctx.strokeStyle = "#caa04a"; ctx.lineWidth = 3.5;
          for (const fo of [-0.45, 0, 0.45]) {
            ctx.beginPath();
            ctx.moveTo(alx, aly - 6);
            ctx.lineTo(alx + Math.cos(arm.ang + fo) * 16, aly - 6 + Math.sin(arm.ang + fo) * 16);
            ctx.stroke();
          }
        }
        // 扇子(号令中)
        if (b.fan > 0) {
          ctx.save();
          ctx.translate(34, -8);
          ctx.rotate(-0.5 + Math.sin(b.ph * 6) * 0.15);
          ctx.fillStyle = "#ffd23f";
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.arc(0, 0, 30, -1.1, 0.35);
          ctx.closePath(); ctx.fill();
          ctx.strokeStyle = "#c93a2e"; ctx.lineWidth = 1.5;
          for (const fa of [-0.9, -0.55, -0.2, 0.15]) {
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(fa) * 30, Math.sin(fa) * 30); ctx.stroke();
          }
          ctx.restore();
        }
        // お札返しの黄金結界
        if (b.reflect > 0) {
          ctx.strokeStyle = `rgba(255,210,63,${0.5 + 0.3 * Math.sin(b.ph * 8)})`;
          ctx.lineWidth = 3;
          ctx.setLineDash([16, 10]);
          ctx.beginPath(); ctx.arc(0, -30, b.r + 26, b.ph, b.ph + Math.PI * 2); ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = "rgba(255,210,63,0.9)";
          ctx.font = `700 22px ${MINCHO}`;
          ctx.textAlign = "center";
          ctx.fillText("返", 0, -30 - b.r - 36);
        }
        // 第二形態の常時バリア(要石を壊すまで無敵)
        if (b.phase === 2 && b.barrierDown <= 0 && b.dying <= 0) {
          ctx.strokeStyle = `rgba(160,107,224,${0.4 + 0.2 * Math.sin(b.ph * 4)})`;
          ctx.lineWidth = 2.5;
          ctx.beginPath(); ctx.arc(0, -30, b.r + 18 + Math.sin(b.ph * 3) * 4, 0, Math.PI * 2); ctx.stroke();
          ctx.fillStyle = "rgba(160,107,224,0.85)";
          ctx.font = `700 18px ${MINCHO}`;
          ctx.textAlign = "center";
          ctx.fillText("結", 0, -30 - b.r - 30);
        }
        ctx.restore();
      } else if (b.type === "oorokuro") {
        // 妖婦『大轆轤』
        ctx.save(); ctx.translate(b.x, b.y);
        // 豪奢な着物の胴
        ctx.fillStyle = fl ? "#f5e8f0" : "#2a1830";
        ctx.beginPath();
        ctx.moveTo(-30, -18);
        ctx.quadraticCurveTo(-40, 14, -34, 38);
        ctx.lineTo(34, 38);
        ctx.quadraticCurveTo(40, 14, 30, -18);
        ctx.quadraticCurveTo(0, -30, -30, -18);
        ctx.closePath(); ctx.fill();
        // 帯と柄
        ctx.fillStyle = "#c93a2e";
        ctx.fillRect(-32, 2, 64, 9);
        ctx.strokeStyle = "rgba(224,138,184,0.5)"; ctx.lineWidth = 1.6;
        for (const [cx2, cy2] of [[-18, 24], [8, 30], [20, 18], [-6, -8], [16, -14]]) {
          ctx.beginPath(); ctx.arc(cx2, cy2, 5, 0, Math.PI * 1.4); ctx.stroke();
        }
        // 襟元
        ctx.strokeStyle = "#e8dcc4"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-9, -20); ctx.lineTo(0, -8); ctx.lineTo(9, -20); ctx.stroke();
        ctx.restore();
        // 伸びる首(世界座標)
        const nnx = b.hx - b.x, nny = b.hy - (b.y - 16);
        ctx.strokeStyle = fl ? "#fff" : "#e8dcc4";
        ctx.lineWidth = 13; ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(b.x, b.y - 16);
        const nseg = 8;
        for (let i = 1; i <= nseg; i++) {
          const tt = i / nseg;
          const wob = Math.sin(tt * Math.PI * 3 + b.ph * 4) * 12 * b.nExt;
          const pxn = -nny, pyn = nnx;
          const pl = Math.hypot(pxn, pyn) || 1;
          ctx.lineTo(b.x + nnx * tt + (pxn / pl) * wob, b.y - 16 + nny * tt + (pyn / pl) * wob);
        }
        ctx.stroke();
        // 頭(世界座標)
        ctx.save();
        ctx.translate(b.hx, b.hy);
        // 尾を引く黒髪
        ctx.strokeStyle = "#0c0a14"; ctx.lineWidth = 6; ctx.lineCap = "round";
        const hb = Math.atan2(-nny, -nnx); // 胴の方向へなびく
        for (let i = -2; i <= 2; i++) {
          ctx.beginPath();
          ctx.moveTo(i * 5, -14);
          const hl = 40 + b.nExt * 30;
          ctx.quadraticCurveTo(
            Math.cos(hb) * hl * 0.5 + i * 9,
            -6 + Math.sin(hb) * hl * 0.5 + Math.sin(b.ph * 3 + i) * 6,
            Math.cos(hb) * hl + i * 7,
            Math.sin(hb) * hl + 10
          );
          ctx.stroke();
        }
        // 白面
        ctx.fillStyle = fl ? "#fff" : "#efe3cd";
        ctx.beginPath(); ctx.ellipse(0, 0, 15, 19, 0, 0, Math.PI * 2); ctx.fill();
        // 紅の目・お歯黒の笑み
        ctx.fillStyle = "#c93a2e";
        ctx.beginPath(); ctx.ellipse(-5.5, -4, 3, 1.9, -0.25, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(5.5, -4, 3, 1.9, 0.25, 0, Math.PI * 2); ctx.fill();
        if (b.nExt > 0.45) {
          // 伸びている間は大口を開ける
          ctx.fillStyle = "#3a0808";
          ctx.beginPath(); ctx.ellipse(0, 8, 5.5, 7, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = "#f0e6d2";
          ctx.beginPath(); ctx.moveTo(-4, 3); ctx.lineTo(-2, 7); ctx.lineTo(0, 3); ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.moveTo(4, 3); ctx.lineTo(2, 7); ctx.lineTo(0, 3); ctx.closePath(); ctx.fill();
        } else {
          ctx.strokeStyle = "#c93a2e"; ctx.lineWidth = 2.2;
          ctx.beginPath(); ctx.moveTo(-5, 8); ctx.quadraticCurveTo(0, 11.5, 5, 8); ctx.stroke();
        }
        ctx.restore();
      } else if (b.type === "nureonna") {
        // 蛇体
        for (let i = b.segs.length - 1; i >= 0; i--) {
          const sg = b.segs[i];
          const r = 12 + (b.segs.length - i) * 3;
          ctx.fillStyle = fl ? "#eaf5e8" : i % 2 === 0 ? "#152a20" : "#12241b";
          ctx.beginPath(); ctx.arc(sg.x, sg.y, r, 0, Math.PI * 2); ctx.fill();
        }
        ctx.save(); ctx.translate(b.x, b.y);
        // 髪
        ctx.strokeStyle = "#0c0a14"; ctx.lineWidth = 5; ctx.lineCap = "round";
        for (let i = -2; i <= 2; i++) {
          ctx.beginPath();
          ctx.moveTo(i * 7, -18);
          ctx.quadraticCurveTo(i * 16, 6, i * 12 + Math.sin(b.ph * 2 + i) * 5, 34);
          ctx.stroke();
        }
        // 女面
        ctx.fillStyle = fl ? "#fff" : "#e8dcc4";
        ctx.beginPath(); ctx.ellipse(0, -4, 17, 21, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#c93a2e";
        ctx.beginPath(); ctx.ellipse(-6, -6, 3.2, 2, -0.3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(6, -6, 3.2, 2, 0.3, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#c93a2e"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-5, 7); ctx.quadraticCurveTo(0, 10, 5, 7); ctx.stroke();
        ctx.restore();
      } else if (b.type === "gashadokuro") {
        ctx.save(); ctx.translate(b.x, b.y);
        const s = b.r / 52;
        ctx.scale(s, s);
        // 頭蓋
        ctx.fillStyle = fl ? "#fff" : "#d6cfba";
        ctx.beginPath();
        ctx.arc(0, -10, 42, Math.PI * 0.95, Math.PI * 0.05);
        ctx.lineTo(34, 18); ctx.quadraticCurveTo(20, 30, 12, 28);
        ctx.lineTo(-12, 28); ctx.quadraticCurveTo(-20, 30, -34, 18);
        ctx.closePath(); ctx.fill();
        // 眼窩
        ctx.fillStyle = "#0a0a14";
        ctx.beginPath(); ctx.ellipse(-16, -10, 11, 13, 0.15, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(16, -10, 11, 13, -0.15, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#e34234";
        ctx.shadowColor = "#e34234"; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(-16, -8, 3.5, 0, Math.PI * 2); ctx.arc(16, -8, 3.5, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
        // 鼻孔・歯
        ctx.fillStyle = "#0a0a14";
        ctx.beginPath(); ctx.moveTo(0, 2); ctx.lineTo(-4, 12); ctx.lineTo(4, 12); ctx.closePath(); ctx.fill();
        for (let i = -3; i <= 3; i++) {
          ctx.fillRect(i * 7 - 2, 20, 4, 9 + (i % 2 === 0 ? 2 : 0));
        }
        ctx.restore();
      } else if (b.type === "yomioni") {
        ctx.save(); ctx.translate(b.x, b.y);
        // 伸びる両腕(体の下に描く)
        for (const arm of [b.a1, b.a2]) {
          if (!arm || arm.ext <= 0.02) continue;
          const alx = Math.cos(arm.ang) * 300 * arm.ext;
          const aly = Math.sin(arm.ang) * 300 * arm.ext;
          ctx.strokeStyle = fl ? "#f5dede" : "#5a1a1a";
          ctx.lineWidth = 17; ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.quadraticCurveTo(alx * 0.5, aly * 0.5 + Math.sin(b.ph * 5) * 10 * arm.ext, alx, aly);
          ctx.stroke();
          // 肘の瘤
          ctx.fillStyle = fl ? "#f5dede" : "#4a1414";
          ctx.beginPath(); ctx.arc(alx * 0.5, aly * 0.5, 11, 0, Math.PI * 2); ctx.fill();
          // 鉤爪
          ctx.strokeStyle = "#caa04a"; ctx.lineWidth = 4;
          for (const fo of [-0.45, 0, 0.45]) {
            ctx.beginPath();
            ctx.moveTo(alx, aly);
            ctx.lineTo(alx + Math.cos(arm.ang + fo) * 18, aly + Math.sin(arm.ang + fo) * 18);
            ctx.stroke();
          }
        }
        ctx.restore();
        ctx.save(); ctx.translate(b.x, b.y);
        // 巨躯
        ctx.fillStyle = fl ? "#f5dede" : "#3a1015";
        ctx.beginPath();
        for (let i = 0; i <= 20; i++) {
          const a = (i / 20) * Math.PI * 2;
          const r = b.r + Math.sin(a * 4 + b.ph * 2) * 5;
          i === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath(); ctx.fill();
        // 二本角
        ctx.fillStyle = fl ? "#f5dede" : "#caa04a";
        ctx.beginPath(); ctx.moveTo(-26, -b.r + 14); ctx.lineTo(-42, -b.r - 30); ctx.lineTo(-12, -b.r + 4); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(26, -b.r + 14); ctx.lineTo(42, -b.r - 30); ctx.lineTo(12, -b.r + 4); ctx.closePath(); ctx.fill();
        // 眼と怒り眉
        ctx.fillStyle = "#ffd23f";
        ctx.shadowColor = "#ffd23f"; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(-15, -10, 6, 0, Math.PI * 2); ctx.arc(15, -10, 6, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "#180608"; ctx.lineWidth = 4; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(-24, -22); ctx.lineTo(-8, -16); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(24, -22); ctx.lineTo(8, -16); ctx.stroke();
        // 牙の口
        ctx.fillStyle = "#180608";
        ctx.beginPath(); ctx.ellipse(0, 16, 18, 9, 0, 0, Math.PI); ctx.fill();
        ctx.fillStyle = "#f0e6d2";
        ctx.beginPath(); ctx.moveTo(-12, 16); ctx.lineTo(-8, 24); ctx.lineTo(-4, 16); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(12, 16); ctx.lineTo(8, 24); ctx.lineTo(4, 16); ctx.closePath(); ctx.fill();
        // 残り火
        if (t % 5 === 0) { /* 描画のみ */ }
        ctx.restore();
      } else {
        // 百目坊
        ctx.save(); ctx.translate(b.x, b.y);
        ctx.fillStyle = fl ? "#e8ddf5" : "#191230";
        ctx.beginPath();
        for (let i = 0; i <= 20; i++) {
          const a = (i / 20) * Math.PI * 2;
          const r = b.r + Math.sin(a * 4 + b.ph * 2) * 6 + Math.sin(a * 7 - b.ph) * 3;
          i === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = fl ? "#e8ddf5" : "#2a1f45";
        ctx.beginPath(); ctx.moveTo(-30, -b.r + 12); ctx.lineTo(-44, -b.r - 26); ctx.lineTo(-16, -b.r + 4); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(30, -b.r + 12); ctx.lineTo(44, -b.r - 26); ctx.lineTo(16, -b.r + 4); ctx.closePath(); ctx.fill();
        ctx.restore();
      }
      // 目群(百目坊/大逆鬼)
      if (b.eyes) {
        ctx.save(); ctx.translate(b.x, b.y);
        for (const eye of b.eyes) {
          eye.blink -= 1;
          if (eye.blink < 0) eye.blink = 120 + Math.random() * 160;
          const open = eye.blink > 8;
          const ex = Math.cos(eye.a + b.ph * 0.3) * eye.d;
          const ey = Math.sin(eye.a + b.ph * 0.3) * eye.d * 0.8;
          ctx.fillStyle = b.type === "yomioni" ? "#ff8a5a" : "#e34234";
          ctx.beginPath();
          if (open) ctx.arc(ex, ey, eye.s, 0, Math.PI * 2);
          else ctx.ellipse(ex, ey, eye.s, 1, 0, 0, Math.PI * 2);
          ctx.fill();
          if (open) {
            ctx.fillStyle = "#0a0a14";
            ctx.beginPath(); ctx.arc(ex, ey, eye.s * 0.4, 0, Math.PI * 2); ctx.fill();
          }
        }
        ctx.restore();
      }
    }

    function drawGrave(g, t) {
      const gr = g.grave;
      ctx.save(); ctx.translate(gr.x, gr.y);
      const unlocked = g.bossDefeated;
      ctx.fillStyle = "#221e30";
      ctx.fillRect(-34, 18, 68, 12); ctx.fillRect(-26, 6, 52, 14);
      ctx.fillStyle = "#2b2640";
      ctx.beginPath();
      ctx.moveTo(-18, 10); ctx.lineTo(-18, -46); ctx.quadraticCurveTo(0, -60, 18, -46); ctx.lineTo(18, 10);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#3a3350";
      ctx.fillRect(-42, -64, 8, 84); ctx.fillRect(36, -58, 8, 78);
      if (unlocked) {
        const gl = ctx.createRadialGradient(0, -20, 4, 0, -20, 90);
        gl.addColorStop(0, "rgba(227,66,52,0.4)"); gl.addColorStop(1, "rgba(227,66,52,0)");
        ctx.fillStyle = gl;
        ctx.beginPath(); ctx.arc(0, -20, 90, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#f0e6d2";
        ctx.font = `600 13px ${MINCHO}`; ctx.textAlign = "center";
        ctx.fillText("触れて封印", 0, 52 + Math.sin(t * 0.08) * 3);
      } else {
        ctx.strokeStyle = "rgba(227,66,52,0.7)"; ctx.lineWidth = 2.5;
        ctx.setLineDash([14, 10]);
        ctx.beginPath(); ctx.arc(0, -14, 78 + Math.sin(t * 0.06) * 4, t * 0.01, t * 0.01 + Math.PI * 2); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = "rgba(227,66,52,0.9)";
        ctx.font = `700 20px ${MINCHO}`; ctx.textAlign = "center";
        ctx.fillText("結", 0, -86);
      }
      if (g.sealing > 0) {
        const s = g.sealing;
        ctx.strokeStyle = `rgba(227,66,52,${Math.max(0, 1 - s / 150)})`;
        ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(0, -16, s * 3.2, 0, Math.PI * 2); ctx.stroke();
        ctx.save();
        ctx.translate(0, -26); ctx.rotate(-0.12);
        ctx.fillStyle = "#f0e6d2"; ctx.fillRect(-9, -16, 18, 34);
        ctx.strokeStyle = "#c93a2e"; ctx.lineWidth = 2; ctx.strokeRect(-9, -16, 18, 34);
        ctx.fillStyle = "#c93a2e";
        ctx.font = `700 14px ${MINCHO}`; ctx.textAlign = "center";
        ctx.fillText("封", 0, 6);
        ctx.restore();
      }
      ctx.restore();
    }

    /* ----- 人型プレイヤー ----- */
    function drawPlayer(p, t) {
      ctx.save(); ctx.translate(p.x, p.y);
      if (p.inv > 0 && Math.floor(t / 4) % 2 === 0) ctx.globalAlpha = 0.35;
      const dir = Math.cos(p.face) < -0.15 ? -1 : 1; // 左向きで反転
      const sw = p.moving ? Math.sin(p.step * 2.2) : 0; // 歩行スイング
      ctx.scale(dir, 1);

      // 脚(袴)
      ctx.strokeStyle = "#2a2438"; ctx.lineWidth = 5; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-3, 8); ctx.lineTo(-4 + sw * 4, 20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(3, 8); ctx.lineTo(4 - sw * 4, 20); ctx.stroke();
      // 足袋
      ctx.strokeStyle = "#e8dcc4"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(-4 + sw * 4, 20); ctx.lineTo(-4 + sw * 4 + 3, 21); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(4 - sw * 4, 20); ctx.lineTo(4 - sw * 4 + 3, 21); ctx.stroke();

      // 装束(白衣)
      ctx.fillStyle = "#f0e6d2";
      ctx.beginPath();
      ctx.moveTo(-8, -8);
      ctx.lineTo(8, -8);
      ctx.quadraticCurveTo(11, 2, 9 + sw, 11);
      ctx.lineTo(-9 - sw, 11);
      ctx.quadraticCurveTo(-11, 2, -8, -8);
      ctx.closePath(); ctx.fill();
      // 襟
      ctx.strokeStyle = "#c93a2e"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-3, -8); ctx.lineTo(0, -2); ctx.lineTo(3, -8); ctx.stroke();
      // 帯
      ctx.fillStyle = "#c93a2e";
      ctx.fillRect(-9, 2, 18, 4);

      // 後ろ腕
      ctx.strokeStyle = "#e0d4bc"; ctx.lineWidth = 4; ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-7, -5); ctx.lineTo(-11 - sw * 2, 4); ctx.stroke();

      // 頭
      ctx.fillStyle = "#e8dcc4";
      ctx.beginPath(); ctx.arc(0, -16, 6.5, 0, Math.PI * 2); ctx.fill();
      // 髪
      ctx.fillStyle = "#181523";
      ctx.beginPath(); ctx.arc(0, -17.5, 6.5, Math.PI * 0.95, Math.PI * 2.05); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-1, -22, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
      // 鉢巻
      ctx.strokeStyle = "#c93a2e"; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(-6.5, -18); ctx.lineTo(6.5, -18); ctx.stroke();
      // 鉢巻の尾(なびく)
      ctx.beginPath();
      ctx.moveTo(-6, -18);
      ctx.quadraticCurveTo(-13, -20 + Math.sin(t * 0.15) * 2, -17, -15 + Math.cos(t * 0.13) * 3);
      ctx.stroke();
      // 目
      ctx.fillStyle = "#181523";
      ctx.beginPath(); ctx.arc(2.5, -16, 1.1, 0, Math.PI * 2); ctx.fill();

      // 前腕: 構え(向いている方向へ) — 反転を打ち消して角度を保つ
      const fa = dir === -1 ? Math.PI - p.face : p.face;
      const hx = Math.cos(fa) * 12, hy = Math.sin(fa) * 10 - 3;
      ctx.strokeStyle = "#e8dcc4"; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(5, -5); ctx.lineTo(hx, hy); ctx.stroke();
      // 手のお札
      ctx.save();
      ctx.translate(hx, hy);
      ctx.rotate(fa + Math.PI / 2);
      ctx.fillStyle = "#f0e6d2"; ctx.fillRect(-3.5, -7, 7, 14);
      ctx.strokeStyle = "#c93a2e"; ctx.lineWidth = 1.5; ctx.strokeRect(-3.5, -7, 7, 14);
      ctx.restore();

      ctx.restore();
    }

    function drawOfuda(o) {
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.rotate(o.ang + Math.PI / 2);
      ctx.shadowColor = "#8be0c8"; ctx.shadowBlur = 10;
      ctx.fillStyle = "#f7efdd"; ctx.fillRect(-6, -12, 12, 24);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "#c93a2e"; ctx.lineWidth = 2; ctx.strokeRect(-6, -12, 12, 24);
      ctx.fillStyle = "#c93a2e";
      ctx.font = `700 11px ${MINCHO}`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("封", 0, 1);
      ctx.restore();
    }

    function render() {
      const g = G.current;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.fillStyle = "#0a0a14";
      ctx.fillRect(0, 0, vw, vh);
      if (!g) return;
      const cfg = g.altSpace
        ? { ...g.cfg, ground: "#1c0508", path: "#2c0a10", wisp: "255,90,74", fogC: "170,25,35" }
        : g.cfg;

      const shx = rnd2(g.shake * 2), shy = rnd2(g.shake * 2);
      ctx.save();
      ctx.translate(-g.cam.x + shx, -g.cam.y + shy);
      const t = g.t;

      // 地面
      ctx.fillStyle = cfg.ground;
      ctx.fillRect(0, 0, WORLD_W, WORLD_H);
      ctx.fillStyle = cfg.path;
      ctx.fillRect(WORLD_W / 2 - 110, 0, 220, WORLD_H);
      ctx.strokeStyle = "rgba(240,230,210,0.05)";
      ctx.lineWidth = 2;
      for (let y = 0; y < WORLD_H; y += 90) {
        ctx.beginPath(); ctx.moveTo(WORLD_W / 2 - 100, y); ctx.lineTo(WORLD_W / 2 + 100, y + 14); ctx.stroke();
      }
      ctx.fillStyle = "rgba(5,5,10,0.5)";
      ctx.fillRect(0, 0, 30, WORLD_H); ctx.fillRect(WORLD_W - 30, 0, 30, WORLD_H);

      for (const d of g.deco) drawDeco(d, t);

      // 背景の鬼火/残り火
      for (const w of g.wisps) {
        w.p += 0.02 * w.s;
        const wx = w.x + Math.sin(w.p) * 24, wy = w.y + Math.cos(w.p * 0.7) * 16;
        ctx.fillStyle = `rgba(${cfg.wisp},${0.12 + 0.08 * Math.sin(w.p * 2)})`;
        ctx.beginPath(); ctx.arc(wx, wy, 3 + w.s, 0, Math.PI * 2); ctx.fill();
      }

      if (!g.extra) {
        drawGrave(g, t);
      } else if (g.megaGrave) {
        // 大封印の墓(巨大・神々しく光る)
        const mg = g.megaGrave;
        ctx.save(); ctx.translate(mg.x, mg.y);
        const pulse = 0.85 + Math.sin(t * 0.06) * 0.15;
        const gl = ctx.createRadialGradient(0, -50, 8, 0, -50, 220 * pulse);
        gl.addColorStop(0, "rgba(255,244,214,0.55)");
        gl.addColorStop(0.5, "rgba(227,66,52,0.22)");
        gl.addColorStop(1, "rgba(227,66,52,0)");
        ctx.fillStyle = gl;
        ctx.beginPath(); ctx.arc(0, -50, 220 * pulse, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#2e2946";
        ctx.fillRect(-80, 40, 160, 26);
        ctx.fillRect(-62, 14, 124, 30);
        ctx.fillStyle = "#3a3456";
        ctx.beginPath();
        ctx.moveTo(-42, 22); ctx.lineTo(-42, -110); ctx.quadraticCurveTo(0, -142, 42, -110); ctx.lineTo(42, 22);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#4a4468";
        ctx.fillRect(-98, -140, 16, 190);
        ctx.fillRect(82, -128, 16, 178);
        ctx.fillStyle = "#f0e6d2";
        ctx.font = `700 34px ${MINCHO}`;
        ctx.textAlign = "center";
        ctx.fillText("大封", 0, -46);
        if (g.finalSeal === 0) {
          ctx.font = `600 14px ${MINCHO}`;
          ctx.fillText("触れて完全封印", 0, 92 + Math.sin(t * 0.08) * 3);
        }
        ctx.restore();
      }
      // 呪いの要石
      for (const st2 of g.stones) {
        ctx.save(); ctx.translate(st2.x, st2.y);
        const kg = ctx.createRadialGradient(0, -12, 2, 0, -12, 42);
        kg.addColorStop(0, "rgba(160,107,224,0.35)");
        kg.addColorStop(1, "rgba(160,107,224,0)");
        ctx.fillStyle = kg;
        ctx.beginPath(); ctx.arc(0, -12, 42, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#241e38";
        ctx.beginPath();
        ctx.moveTo(-12, 12); ctx.lineTo(-9, -26); ctx.lineTo(0, -34); ctx.lineTo(9, -26); ctx.lineTo(12, 12);
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "rgba(160,107,224,0.6)"; ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = "#a06be0";
        ctx.font = `700 15px ${MINCHO}`;
        ctx.textAlign = "center";
        ctx.fillText("呪", 0, -8);
        ctx.restore();
      }
      // お茶の爆弾(放物線で飛ぶ湯呑み)
      for (const bm of g.bombs) {
        const k = bm.t / bm.T;
        const bx2 = bm.sx + (bm.tx - bm.sx) * k;
        const byG = bm.sy + (bm.ty - bm.sy) * k;
        const arc = Math.sin(Math.PI * k) * 130;
        // 落下地点の印
        ctx.strokeStyle = `rgba(127,200,106,${0.3 + 0.3 * Math.sin(t * 0.4)})`;
        ctx.lineWidth = 2; ctx.setLineDash([6, 6]);
        ctx.beginPath(); ctx.arc(bm.tx, bm.ty, 26, 0, Math.PI * 2); ctx.stroke();
        ctx.setLineDash([]);
        // 影
        ctx.fillStyle = "rgba(5,5,10,0.4)";
        ctx.beginPath(); ctx.ellipse(bx2, byG, 9 * (1 - Math.sin(Math.PI * k) * 0.4), 4, 0, 0, Math.PI * 2); ctx.fill();
        // 湯呑み
        ctx.save(); ctx.translate(bx2, byG - arc);
        ctx.rotate(bm.t * 0.2);
        ctx.fillStyle = "#f0e6d2";
        ctx.fillRect(-7, -8, 14, 14);
        ctx.fillStyle = "#7fc86a";
        ctx.fillRect(-6, -7, 12, 4);
        ctx.strokeStyle = "#c93a2e"; ctx.lineWidth = 1.5;
        ctx.strokeRect(-7, -8, 14, 14);
        ctx.restore();
      }
      // 合わせ鏡の影(黒い分身)
      for (const sh of g.shadows) {
        if (sh.x === undefined) continue;
        ctx.save(); ctx.translate(sh.x, sh.y);
        const a2 = sh.life > 280 ? (330 - sh.life) / 50 : Math.min(1, sh.life / 40);
        ctx.globalAlpha = a2 * 0.8;
        ctx.fillStyle = "#0a0812";
        ctx.beginPath();
        ctx.moveTo(-8, -8);
        ctx.lineTo(8, -8);
        ctx.quadraticCurveTo(11, 2, 9, 11);
        ctx.lineTo(-9, 11);
        ctx.quadraticCurveTo(-11, 2, -8, -8);
        ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.arc(0, -16, 7, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#e34234";
        ctx.beginPath(); ctx.arc(-2.5, -16, 1.4, 0, Math.PI * 2); ctx.arc(2.5, -16, 1.4, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
      }
      for (const e of g.enemies) drawEnemy(e, t);
      if (g.boss && (g.boss.hp > 0 || g.boss.dying > 0)) {
        const b = g.boss;
        const flicker = b.dying > 0 && Math.floor(t / 3) % 2 === 0;
        if (!b.hidden && !flicker) drawBoss(b, t);
        // テレポート急襲: 足元の黒い影
        if (b.hidden && b.state === "teleSlam") {
          const gr2 = Math.min(1, (b.st - 8) / 44);
          ctx.fillStyle = `rgba(8,6,14,${0.5 + 0.3 * gr2})`;
          ctx.beginPath(); ctx.ellipse(b.tx, b.ty, 60 * gr2 + 12, 24 * gr2 + 6, 0, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = `rgba(227,66,52,${0.3 + 0.3 * Math.sin(t * 0.5)})`;
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.ellipse(b.tx, b.ty, 66 * gr2 + 14, 27 * gr2 + 8, 0, 0, Math.PI * 2); ctx.stroke();
        }
        // 目からの光線
        if (b.state === "beam") {
          const ex2 = b.x + Math.cos(b.beamA) * 820;
          const ey2 = b.y - 20 + Math.sin(b.beamA) * 820;
          if (b.st < 45) {
            ctx.strokeStyle = `rgba(255,210,63,${0.2 + 0.25 * Math.sin(t * 0.6)})`;
            ctx.lineWidth = 2; ctx.setLineDash([5, 9]);
            ctx.beginPath(); ctx.moveTo(b.x, b.y - 20); ctx.lineTo(ex2, ey2); ctx.stroke();
            ctx.setLineDash([]);
          } else if (b.st < 100) {
            ctx.save();
            ctx.strokeStyle = "rgba(255,210,63,0.35)";
            ctx.lineWidth = 26; ctx.lineCap = "round";
            ctx.beginPath(); ctx.moveTo(b.x, b.y - 20); ctx.lineTo(ex2, ey2); ctx.stroke();
            ctx.strokeStyle = "#fff6d8";
            ctx.lineWidth = 9;
            ctx.beginPath(); ctx.moveTo(b.x, b.y - 20); ctx.lineTo(ex2, ey2); ctx.stroke();
            ctx.restore();
          }
        }
        // 狙撃の照準線
        if (b.state === "snipe" && b.st % 32 >= 8 && b.st < 100) {
          ctx.strokeStyle = `rgba(227,66,52,${0.2 + 0.25 * Math.sin(t * 0.6)})`;
          ctx.lineWidth = 2;
          ctx.setLineDash([4, 8]);
          ctx.beginPath();
          ctx.moveTo(b.x, b.y);
          ctx.lineTo(b.x + Math.cos(b.snipeA) * 720, b.y + Math.sin(b.snipeA) * 720);
          ctx.stroke();
          ctx.setLineDash([]);
        }
        // 波紋の予兆(足元の呪印)
        if (b.state === "flood" && ((b.st >= 12 && b.st < 50) || (b.st >= 62 && b.st < 100))) {
          const pr = 26 + Math.sin(t * 0.4) * 4;
          ctx.strokeStyle = "rgba(127,214,168,0.65)";
          ctx.lineWidth = 2.5;
          ctx.beginPath(); ctx.arc(b.fx, b.fy, pr, 0, Math.PI * 2); ctx.stroke();
          ctx.strokeStyle = "rgba(127,214,168,0.3)";
          ctx.beginPath(); ctx.arc(b.fx, b.fy, pr + 12, 0, Math.PI * 2); ctx.stroke();
          ctx.fillStyle = "rgba(127,214,168,0.8)";
          ctx.font = `700 15px ${MINCHO}`;
          ctx.textAlign = "center";
          ctx.fillText("呪", b.fx, b.fy + 5);
        }
      }

      for (const bl of g.bullets) {
        const c = bl.c || "#a06be0";
        ctx.fillStyle = c;
        ctx.shadowColor = c; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(bl.x, bl.y, bl.r, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#0a0a14";
        ctx.beginPath(); ctx.arc(bl.x, bl.y, bl.r * 0.4, 0, Math.PI * 2); ctx.fill();
      }
      for (const o of g.ofudas) drawOfuda(o);
      if (g.player.hp > 0) drawPlayer(g.player, t);

      for (const q of g.particles) {
        const a = q.life / q.max;
        if (q.text) {
          ctx.fillStyle = q.color;
          ctx.globalAlpha = a;
          ctx.font = `700 ${q.size}px ${MINCHO}`;
          ctx.textAlign = "center";
          ctx.fillText(q.text, q.x, q.y);
          ctx.globalAlpha = 1;
        } else {
          ctx.fillStyle = q.color;
          ctx.globalAlpha = a * 0.9;
          ctx.beginPath(); ctx.arc(q.x, q.y, q.size * a, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = 1;
        }
      }
      for (const f of g.fog) {
        const fg = ctx.createRadialGradient(f.x, f.y, 1, f.x, f.y, f.r);
        fg.addColorStop(0, `rgba(${cfg.fogC},${f.a})`);
        fg.addColorStop(1, `rgba(${cfg.fogC},0)`);
        ctx.fillStyle = fg;
        ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();

      // ビネット
      const vg = ctx.createRadialGradient(vw / 2, vh / 2, Math.min(vw, vh) * 0.35, vw / 2, vh / 2, Math.max(vw, vh) * 0.75);
      vg.addColorStop(0, "rgba(0,0,0,0)");
      vg.addColorStop(1, "rgba(4,3,10,0.62)");
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, vw, vh);

      /* ----- HUD ----- */
      for (let i = 0; i < g.player.maxHp; i++) {
        const x = 22 + i * 24, y = 26;
        const on = i < g.player.hp;
        ctx.fillStyle = on ? "#8be0c8" : "rgba(139,224,200,0.15)";
        if (on) { ctx.shadowColor = "#8be0c8"; ctx.shadowBlur = 8; }
        ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x - 5, y - 3);
        ctx.quadraticCurveTo(x - 11, y - 1, x - 12, y + 4);
        ctx.quadraticCurveTo(x - 6, y + 4, x - 3, y + 6);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      ctx.fillStyle = "rgba(240,230,210,0.55)";
      ctx.font = `600 12px ${MINCHO}`;
      ctx.textAlign = "right";
      ctx.fillText(cfg.name, vw - 16, 30);
      ctx.fillStyle = "rgba(240,230,210,0.4)";
      ctx.fillText(`祓 ${g.kills}`, vw - 16, 50);

      if (g.boss && g.boss.hp > 0 && g.boss.state !== "enter") {
        const bw = Math.min(vw - 80, 360);
        const bx = vw / 2 - bw / 2, by = 54;
        ctx.fillStyle = "rgba(240,230,210,0.7)";
        ctx.font = `600 12px ${MINCHO}`;
        ctx.textAlign = "center";
        ctx.fillText(g.boss.phase === 2 ? g.boss.name + "・真" : g.boss.name, vw / 2, by - 6);
        ctx.fillStyle = "rgba(10,10,20,0.7)";
        ctx.fillRect(bx, by, bw, 8);
        ctx.fillStyle = g.boss.bulletC;
        ctx.fillRect(bx, by, bw * (g.boss.hp / g.boss.maxHp), 8);
        ctx.strokeStyle = "rgba(240,230,210,0.3)";
        ctx.lineWidth = 1;
        ctx.strokeRect(bx, by, bw, 8);
      }

      const grSy = g.grave.y - g.cam.y;
      if (grSy < -20 && g.sealing === 0) {
        const ix = g.grave.x - g.cam.x;
        ctx.fillStyle = g.bossDefeated ? "#e34234" : "rgba(240,230,210,0.5)";
        ctx.beginPath();
        ctx.moveTo(ix, 74); ctx.lineTo(ix - 8, 88); ctx.lineTo(ix + 8, 88);
        ctx.closePath(); ctx.fill();
      }

      if (g.msg.t > 0) {
        const a = Math.min(1, g.msg.t / 60);
        ctx.fillStyle = `rgba(240,230,210,${a})`;
        ctx.font = `600 16px ${MINCHO}`;
        ctx.textAlign = "center";
        ctx.fillText(g.msg.text, vw / 2, vh * 0.22);
      }
      if (g.sealing > 30) {
        ctx.fillStyle = `rgba(227,66,52,${Math.min(1, (g.sealing - 30) / 40)})`;
        ctx.font = `700 42px ${MINCHO}`;
        ctx.textAlign = "center";
        ctx.fillText("封 印", vw / 2, vh * 0.4);
      }
      // 反転の呪いの表示
      if (g.revT > 0) {
        ctx.fillStyle = "rgba(160,107,224,0.08)";
        ctx.fillRect(0, 0, vw, vh);
        ctx.fillStyle = `rgba(160,107,224,${0.6 + 0.3 * Math.sin(t * 0.4)})`;
        ctx.font = `700 20px ${MINCHO}`;
        ctx.textAlign = "center";
        ctx.fillText("反 転", vw / 2, vh * 0.13);
      }
      // 完全封印の白フェード
      if (g.finalSeal > 0) {
        const wa = Math.min(1, g.finalSeal / 200);
        ctx.fillStyle = `rgba(250,247,240,${wa})`;
        ctx.fillRect(0, 0, vw, vh);
        if (g.finalSeal > 120) {
          ctx.fillStyle = `rgba(150,30,24,${Math.min(1, (g.finalSeal - 120) / 80)})`;
          ctx.font = `700 40px ${MINCHO}`;
          ctx.textAlign = "center";
          ctx.fillText("完 全 封 印", vw / 2, vh * 0.45);
          ctx.font = `600 15px ${MINCHO}`;
          ctx.fillText("GAME CLEAR", vw / 2, vh * 0.45 + 34);
        }
      }

      if (g.joy) {
        const j = g.joy;
        const m = Math.hypot(j.dx, j.dy);
        const cl = Math.min(m, 52);
        const nx = m > 0 ? (j.dx / m) * cl : 0;
        const ny = m > 0 ? (j.dy / m) * cl : 0;
        ctx.strokeStyle = "rgba(240,230,210,0.25)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(j.sx, j.sy, 52, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = "rgba(240,230,210,0.35)";
        ctx.beginPath(); ctx.arc(j.sx + nx, j.sy + ny, 22, 0, Math.PI * 2); ctx.fill();
      }
      if (g.firePtr && g.firePtr.cx !== undefined) {
        const f = g.firePtr;
        if (Math.hypot(f.cx - f.sx, f.cy - f.sy) > 22) {
          ctx.strokeStyle = "rgba(227,66,52,0.5)";
          ctx.lineWidth = 2;
          ctx.setLineDash([6, 6]);
          ctx.beginPath(); ctx.moveTo(f.sx, f.sy); ctx.lineTo(f.cx, f.cy); ctx.stroke();
          ctx.setLineDash([]);
        }
      }
    }

    const loop = () => {
      if (screenRef.current === "play" && G.current) update();
      render();
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", resize);
      window.removeEventListener("keydown", kd);
      window.removeEventListener("keyup", ku);
      cvs.removeEventListener("pointerdown", pd);
      cvs.removeEventListener("pointermove", pm);
      cvs.removeEventListener("pointerup", pu);
      cvs.removeEventListener("pointercancel", pu);
    };
  }, []);

  /* ---------- 画面遷移 ---------- */
  const startNew = (diff) => {
    initAudio();
    extraRef.current = false;
    if (diff) diffRef.current = diff;
    stageRef.current = 0;
    carryRef.current = { kills: 0, timeAcc: 0 };
    initGame();
    setScreen("play");
  };
  const startExtra = () => {
    initAudio();
    extraRef.current = true;
    stageRef.current = 0;
    carryRef.current = { kills: 0, timeAcc: 0 };
    initGame();
    setScreen("play");
  };
  const retryStage = () => { initAudio(); initGame(); setScreen("play"); };
  const nextStage = () => {
    initAudio();
    stageRef.current += 1;
    initGame();
    setScreen("play");
  };

  /* ---------- オーバーレイUI ---------- */
  const overlayBase = {
    position: "absolute", inset: 0, display: "flex", flexDirection: "column",
    alignItems: "center", justifyContent: "center", textAlign: "center",
    background: "radial-gradient(ellipse at 50% 30%, rgba(23,18,40,0.92), rgba(6,5,12,0.97))",
    color: "#f0e6d2", fontFamily: MINCHO, padding: 24, zIndex: 5,
  };
  const btnStyle = {
    marginTop: 30, padding: "14px 52px", fontSize: 17, fontFamily: MINCHO,
    fontWeight: 600, letterSpacing: "0.35em", textIndent: "0.35em",
    color: "#f0e6d2", background: "rgba(201,58,46,0.16)",
    border: "1px solid #c93a2e", borderRadius: 2, cursor: "pointer",
  };
  const kanjiTitle = {
    fontSize: "clamp(52px, 16vw, 88px)", fontWeight: 700, letterSpacing: "0.18em",
    textIndent: "0.18em", lineHeight: 1.15, margin: "8px 0",
    textShadow: "0 0 26px rgba(139,224,200,0.35)",
  };
  const nightNum = ["一", "二", "三", "四", "五"];

  return (
    <div
      ref={wrapRef}
      style={{
        position: "relative", width: "100%", height: "100dvh", minHeight: 480,
        background: "#0a0a14", overflow: "hidden", touchAction: "none",
        userSelect: "none", WebkitUserSelect: "none", overscrollBehavior: "none",
      }}
    >
      <canvas ref={canvasRef} style={{ display: "block", touchAction: "none" }} />

      {/* 音の切替 */}
      <button
        onClick={toggleMute}
        style={{
          position: "absolute", top: 62, right: 10, zIndex: 6,
          width: 36, height: 36, borderRadius: "50%",
          border: "1px solid rgba(240,230,210,0.3)",
          background: "rgba(10,10,20,0.55)", color: muted ? "rgba(240,230,210,0.4)" : "#8be0c8",
          fontSize: 14, fontFamily: MINCHO, cursor: "pointer", padding: 0,
        }}
      >
        {muted ? "黙" : "音"}
      </button>

      {screen === "title" && (
        <div style={overlayBase}>
          <div style={{ fontSize: 13, letterSpacing: "0.5em", textIndent: "0.5em", color: "#8be0c8", opacity: 0.8 }}>
            呪符退魔行動・全五夜
          </div>
          <h1 style={kanjiTitle}>封夜行</h1>
          <div style={{ fontSize: 13, opacity: 0.75, lineHeight: 2, maxWidth: 320 }}>
            常闇の参道、沈み沼、骸の竹林、百鬼の宿場、そして黄泉比良坂。<br />
            五つの夜を越え、すべての奥津城に封を貼れ。
          </div>
          <div style={{
            marginTop: 24, fontSize: 12, opacity: 0.6, lineHeight: 2,
            border: "1px solid rgba(240,230,210,0.2)", padding: "12px 20px", borderRadius: 2,
          }}>
            左画面ドラッグ … 移動<br />
            右画面タップ … 自動エイム射撃<br />
            右画面スワイプ … 方向指定射撃<br />
            右上の「音」 … 怪音の切替（音量注意）
          </div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", justifyContent: "center" }}>
            <button style={{ ...btnStyle, borderColor: "#8be0c8", background: "rgba(139,224,200,0.1)", padding: "12px 22px", marginTop: 26 }} onClick={() => startNew("easy")}>
              宵闇<span style={{ fontSize: 11, opacity: 0.7, display: "block", letterSpacing: "0.1em", marginTop: 4 }}>易しい</span>
            </button>
            <button style={{ ...btnStyle, padding: "12px 22px", marginTop: 26 }} onClick={() => startNew("normal")}>
              常闇<span style={{ fontSize: 11, opacity: 0.7, display: "block", letterSpacing: "0.1em", marginTop: 4 }}>通常</span>
            </button>
            <button style={{ ...btnStyle, borderColor: "#caa04a", background: "rgba(202,160,74,0.14)", color: "#ffd23f", padding: "12px 22px", marginTop: 26 }} onClick={startExtra}>
              番外<span style={{ fontSize: 11, opacity: 0.7, display: "block", letterSpacing: "0.1em", marginTop: 4 }}>ぬらりひょん</span>
            </button>
            <button style={{ ...btnStyle, borderColor: "#7a1f6e", background: "rgba(122,31,110,0.18)", color: "#e8a0dc", padding: "12px 22px", marginTop: 26 }} onClick={() => startNew("hard")}>
              獄闇<span style={{ fontSize: 11, opacity: 0.7, display: "block", letterSpacing: "0.1em", marginTop: 4 }}>百鬼夜行</span>
            </button>
          </div>
        </div>
      )}

      {screen === "over" && (
        <div style={overlayBase}>
          <h1 style={{ ...kanjiTitle, color: "#c93a2e", textShadow: "0 0 26px rgba(201,58,46,0.4)" }}>
            呪 殺
          </h1>
          <div style={{ fontSize: 13, opacity: 0.7, lineHeight: 2 }}>
            {STAGES[result.stage].name}にて闇に呑まれた——<br />
            祓った妖: {result.kills} 体
          </div>
          <button style={btnStyle} onClick={retryStage}>再 行</button>
        </div>
      )}

      {screen === "stageclear" && (
        <div style={overlayBase}>
          <div style={{ fontSize: 13, letterSpacing: "0.5em", textIndent: "0.5em", color: "#e34234" }}>
            封印完了
          </div>
          <h1 style={{ ...kanjiTitle, fontSize: "clamp(40px, 12vw, 68px)", textShadow: "0 0 30px rgba(227,66,52,0.4)" }}>
            第{nightNum[result.stage]}夜 了
          </h1>
          <div style={{ fontSize: 13, opacity: 0.75, lineHeight: 2.1 }}>
            {STAGES[result.stage].name}を鎮めた。<br />
            祓った妖: {result.kills} 体<br />
            だが、夜はまだ深い——
          </div>
          <button style={btnStyle} onClick={nextStage}>次の夜へ</button>
        </div>
      )}

      {screen === "extraclear" && (
        <div style={overlayBase}>
          <div style={{ fontSize: 13, letterSpacing: "0.5em", textIndent: "0.5em", color: "#ffd23f" }}>
            GAME CLEAR
          </div>
          <h1 style={{ ...kanjiTitle, textShadow: "0 0 30px rgba(255,210,63,0.5)" }}>完全封印</h1>
          <div style={{ fontSize: 13, opacity: 0.75, lineHeight: 2.1 }}>
            総大将ぬらりひょんは、大封印の下に永く眠る。<br />
            妖怪たちの宴は、静かに幕を下ろした——<br />
            祓った妖: {result.kills} 体<br />
            所要時間: {result.time.toFixed(1)} 秒
          </div>
          <button style={btnStyle} onClick={() => setScreen("title")}>銘を選び直す</button>
        </div>
      )}

      {screen === "clear" && (
        <div style={overlayBase}>
          <div style={{ fontSize: 13, letterSpacing: "0.5em", textIndent: "0.5em", color: "#e34234" }}>
            全夜封印
          </div>
          <h1 style={{ ...kanjiTitle, textShadow: "0 0 30px rgba(227,66,52,0.45)" }}>大団円</h1>
          <div style={{ fontSize: 13, opacity: 0.75, lineHeight: 2.1 }}>
            黄泉比良坂は閉ざされ、世は静寂を取り戻した。<br />
            祓った妖: {result.kills} 体<br />
            総所要時間: {result.time.toFixed(1)} 秒
          </div>
          <button style={btnStyle} onClick={() => setScreen("title")}>銘を選び直す</button>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<OfudaSealGame />);
</script>
</body>
</html>
