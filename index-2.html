const { useRef, useEffect, useState } = React;

/* ============================================================
   『封夜行』 v2 — 全四夜構成
   ・左半分ドラッグ: 移動 / 右半分タップ: 自動エイム / スワイプ: 方向射撃

   ・雑魚7種 + 夜ごとのボス4体
   ============================================================ */

const WORLD_W = 720;
const WORLD_H = 2600;

/* ---------- 難易度 ---------- */
const DIFFS = {
  easy: {
    label: "宵闇", pHp: 9, bossHp: 0.7, eSp: 0.85, blt: 0.78,
    spawnItv: 1.6, cap: 7, bossCap: 3, bossItv: 200, fireCd: 11, slowT: 70, initE: 6,
  },
  normal: {
    label: "常闇", pHp: 6, bossHp: 1, eSp: 1, blt: 1,
    spawnItv: 1, cap: 9, bossCap: 5, bossItv: 135, fireCd: 15, slowT: 110, initE: 8,
  },
  hard: {
    label: "獄闇", pHp: 5, bossHp: 1.3, eSp: 1.12, blt: 1.15,
    spawnItv: 0.6, cap: 14, bossCap: 7, bossItv: 95, fireCd: 15, slowT: 140, initE: 13,
  },
};
let DIFF_ESP = 1; // makeEnemyが参照する敵速度倍率

/* ---------- 番外: ぬらりひょんの宴 ---------- */
const EXTRA_CFG = {
  name: "番外『ぬらりひょんの宴』",
  ground: "#120d18", path: "#1b1322",
  wisp: "255,190,110", fogC: "120,60,110",
  deco: "shukuba",
  enemies: [["wisp", 3], ["leaf", 2], ["kasa", 2], ["chochin", 2]],
  boss: { type: "nurarihyon", name: "総大将『ぬらりひょん』", hp: 60, patterns: [], bulletC: "#ffd23f" },
};
const NURA_PATS = ["armCross", "beam", "teaBomb", "reflect", "gyoretsu", "teleSlam", "vortex", "pinball", "reverse", "mirror"];
const MINCHO = '"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",serif';

/* ---------- ステージ定義 ---------- */
const STAGES = [
  {
    name: "第一夜『常闇の参道』",
    ground: "#100e1c", path: "#161327",
    wisp: "139,224,200", fogC: "107,79,160",
    deco: "sando",
    enemies: [["wisp", 4], ["shade", 3], ["crawler", 2], ["tanuki", 2]],
    boss: { type: "hyakume", name: "怨霊『百目坊』", hp: 45, patterns: ["ring", "aimed", "cross", "charge"], patterns2: ["ring", "cross", "aimed", "homing", "charge"], bulletC: "#a06be0" },
  },
  {
    name: "第二夜『沈み沼の御社』",
    ground: "#0b120e", path: "#122019",
    wisp: "127,214,168", fogC: "58,118,96",
    deco: "swamp",
    enemies: [["wisp", 2], ["chochin", 2], ["kasa", 2], ["rokurokubi", 2], ["kappa", 3], ["dorotabo", 2], ["ittan", 2]],
    boss: { type: "nureonna", name: "大蛇『濡女』", hp: 55, patterns: ["wave", "flood", "spiral", "summon"], patterns2: ["wave", "flood", "homing", "spiral", "summon"], bulletC: "#7fd6a8" },
  },
  {
    name: "第三夜『骸の竹林』",
    ground: "#0d110b", path: "#181e12",
    wisp: "205,220,170", fogC: "92,110,74",
    deco: "bamboo",
    enemies: [["kamaitachi", 3], ["kasa", 2], ["honemusha", 3], ["tsuchigumo", 2], ["tengu", 2], ["ittan", 2]],
    boss: { type: "gashadokuro", name: "巨骸『餓者髑髏』", hp: 65, patterns: ["slam", "rain", "walls", "aimed"], patterns2: ["slam", "rain", "snipe", "walls", "aimed"], bulletC: "#e8e2d0" },
  },
  {
    name: "第四夜『百鬼の宿場』",
    ground: "#120d18", path: "#1b1322",
    wisp: "255,170,90", fogC: "120,60,110",
    deco: "shukuba",
    enemies: [["chochin", 2], ["kasa", 2], ["tenaga", 3], ["tsuchigumo", 2], ["wara", 2], ["namakubi", 2], ["rokurokubi", 2]],
    boss: { type: "oorokuro", name: "妖婦『大轆轤』", hp: 72, patterns: ["neckThrust", "hairNeedles", "neckSweep", "summon"], patterns2: ["neckThrust", "neckSweep", "hairNeedles", "homing", "summon"], bulletC: "#e08ab8" },
  },
  {
    name: "最終夜『黄泉比良坂』",
    ground: "#150a0d", path: "#221016",
    wisp: "255,122,92", fogC: "158,52,52",
    deco: "yomi",
    enemies: [["yukionna", 2], ["kamaitachi", 2], ["nurikabe", 2], ["namakubi", 2], ["honemusha", 2], ["kasha", 3], ["tengu", 2], ["ittan", 2]],
    boss: { type: "yomioni", name: "黄泉軍『大逆鬼』", hp: 80, patterns: ["ring", "armCross", "cross", "spiral", "charge", "slam"], patterns2: ["ring", "armCross", "cross", "split", "spiral", "snipe", "charge", "slam"], bulletC: "#ff5a4a" },
  },

/* ---------- 妖怪の生成 ---------- */
function makeEnemy(x, y, type) {
  const base = { x, y, type, flash: 0, ph: Math.random() * Math.PI * 2, kx: 0, ky: 0, st: 0 };
  const e = makeEnemyBase(base, x, y, type);
  e.sp *= DIFF_ESP;
  return e;
}
function makeEnemyBase(base, x, y, type) {
  switch (type) {
    case "wisp":      return { ...base, hp: 1, r: 12, sp: 1.9 };                  // 鬼火: 揺れながら接近
    case "shade":     return { ...base, hp: 2, r: 16, sp: 1.35 };                 // 影: 蛇行接近
    case "crawler":   return { ...base, hp: 3, r: 24, sp: 0.85 };                 // 這い寄り: 硬い
    case "chochin":   return { ...base, hp: 2, r: 15, sp: 1.1, shootT: 60 };      // 提灯お化け: 遠距離火弾
    case "kasa":      return { ...base, hp: 2, r: 14, sp: 0, hvx: 0, hvy: 0 };    // 唐傘: 跳躍突撃
    case "kamaitachi":return { ...base, hp: 1, r: 12, sp: 2.2, mode: 0, dvx: 0, dvy: 0 }; // 鎌鼬: 旋回→突進
    case "nurikabe":  return { ...base, hp: 8, r: 30, sp: 0.5 };                  // 塗壁: 巨体・重装甲
    case "tanuki":    return { ...base, hp: 2, r: 16, sp: 1.5 };                  // 化け狸: 倒すと木の葉に化けて分裂
    case "leaf":      return { ...base, hp: 1, r: 9, sp: 2.5 };                   // 木の葉: 小さく速い
    case "rokurokubi":return { ...base, hp: 6, r: 14, sp: 0.9, ext: 0, na: 0, hx: x, hy: y }; // ろくろ首: 首を伸ばして噛みつく
    case "honemusha": return { ...base, hp: 5, r: 16, sp: 1.0, dvx: 0, dvy: 0, lunge: 0 };    // 骨武者: 刀の踏み込み斬り
    case "namakubi":  return { ...base, hp: 1, r: 13, sp: 0.8 };                  // 飛頭蛮: 瞬間移動で忍び寄る生首
    case "yukionna":  return { ...base, hp: 3, r: 15, sp: 0.7, shootT: 40 };      // 雪女: 氷礫で鈍らせる
    case "ittan":     return { ...base, hp: 6, r: 14, sp: 3.0, trail: [] };       // 一反木綿: 高速で舞い、絡みつきに来る
    case "kappa":     return { ...base, hp: 3, r: 14, sp: 1.2, shootT: 50 };      // 河童: 間合いを取って皿礫を投げる
    case "dorotabo":  return { ...base, hp: 5, r: 22, sp: 0.5, sub: false };      // 泥田坊: 地に潜って足元から現れる
    case "tengu":     return { ...base, hp: 5, r: 16, sp: 1.3, shootT: 60 };      // 天狗: 羽団扇の突風
    case "kasha":     return { ...base, hp: 3, r: 13, sp: 2.4, mode: 0, dvx: 0, dvy: 0 }; // 火車: 炎を纏って旋回し体当たり
    case "tenaga":    return { ...base, hp: 5, r: 15, sp: 0.8, ext: 0, na: 0, hx: x, hy: y }; // 手長: 遠間から長い腕で掴みかかる
    case "tsuchigumo":return { ...base, hp: 4, r: 17, sp: 1.2, shootT: 60 };      // 土蜘蛛: 横這いで蜘蛛の糸を吐く
    case "wara":      return { ...base, hp: 2, r: 13, sp: 1.1 };                  // 呪い藁人形: 滅すると呪詛が弾ける
    default:          return { ...base, hp: 1, r: 12, sp: 1.5 };
  }
}

function makeBoss(cfg) {
  const b = {
    x: WORLD_W / 2, y: 480, r: cfg.type === "gashadokuro" ? 58 : cfg.type === "nureonna" ? 40 : 52,
    hp: cfg.hp, maxHp: cfg.hp, flash: 0, ph: 0,
    type: cfg.type, name: cfg.name, patterns: cfg.patterns, patterns2: cfg.patterns2 || cfg.patterns, bulletC: cfg.bulletC,
    snipeA: 0, fx: 0, fy: 0,
    state: "enter", st: 0, pi: -1, ang: 0,
    dashVX: 0, dashVY: 0, tx: WORLD_W / 2, ty: 480,
  };
  if (cfg.type === "hyakume" || cfg.type === "yomioni") {
    b.eyes = Array.from({ length: 9 }, () => ({
      a: Math.random() * Math.PI * 2, d: 8 + Math.random() * 34,
      s: 3 + Math.random() * 5, blink: Math.random() * 200,
    }));
  }
  if (cfg.type === "nureonna") {
    b.segs = Array.from({ length: 8 }, () => ({ x: b.x, y: b.y - 200 }));
  }
  if (cfg.type === "oorokuro") {
    b.r = 44;
    b.nExt = 0; b.nAng = -Math.PI / 2;
    b.hx = b.x; b.hy = b.y - 24;
  }
  if (cfg.type === "yomioni" || cfg.type === "nurarihyon") {
    b.a1 = { ext: 0, ang: 0 };
    b.a2 = { ext: 0, ang: 0 };
  }
  if (cfg.type === "nurarihyon") {
    b.r = 46;
    b.phase = 1;
    b.reflect = 0;      // お札返し中
    b.hidden = false;   // テレポート中
    b.barrierDown = 0;  // 第二形態のバリア剥がれ残り
    b.fan = 0;
    b.beamA = 0; b.dying = 0;
    b.byMin = 0; b.byMax = 0; b.bounces = 0;
  }
  return b;
}

function OfudaSealGame() {
  const wrapRef = useRef(null);
  const canvasRef = useRef(null);
  const G = useRef(null);
  const stageRef = useRef(0);
  const carryRef = useRef({ kills: 0, timeAcc: 0 });
  const diffRef = useRef("normal");
  const extraRef = useRef(false);
  const [screen, setScreen] = useState("title"); // title | play | over | stageclear | clear
  const screenRef = useRef("title");
  const [result, setResult] = useState({ kills: 0, time: 0, stage: 0 });
  screenRef.current = screen;

  /* ---------- ステージ初期化 ---------- */
  const initGame = () => {
    const si = stageRef.current;
    const isExtra = extraRef.current;
    const cfg = isExtra ? EXTRA_CFG : STAGES[si];
    const df = isExtra ? { ...DIFFS.normal, label: "番外" } : DIFFS[diffRef.current];
    DIFF_ESP = df.eSp;
    const deco = [];
    const R = Math.random;

    if (cfg.deco === "sando") {
      for (let y = WORLD_H - 200; y > 500; y -= 320) {
        deco.push({ type: "lantern", x: WORLD_W / 2 - 190, y });
        deco.push({ type: "lantern", x: WORLD_W / 2 + 190, y: y - 160 });
      }
      for (let i = 0; i < 24; i++) {
        const s = R() < 0.5 ? -1 : 1;
        deco.push({ type: R() < 0.6 ? "grave" : "tree", x: WORLD_W / 2 + s * (230 + R() * 110), y: 380 + R() * (WORLD_H - 700), s: 0.7 + R() * 0.6 });
      }
      deco.push({ type: "torii", x: WORLD_W / 2, y: 980, s: 1 });
    } else if (cfg.deco === "swamp") {
      for (let i = 0; i < 12; i++) {
        deco.push({ type: "pool", x: 80 + R() * (WORLD_W - 160), y: 400 + R() * (WORLD_H - 700), s: 0.6 + R() * 0.9 });
      }
      for (let i = 0; i < 22; i++) {
        const s = R() < 0.5 ? -1 : 1;
        deco.push({ type: "reed", x: WORLD_W / 2 + s * (200 + R() * 140), y: 350 + R() * (WORLD_H - 650), s: 0.7 + R() * 0.6 });
      }
      deco.push({ type: "shrine", x: WORLD_W / 2, y: 460, s: 1 });
      deco.push({ type: "torii", x: WORLD_W / 2, y: 1500, s: 0.8 });
    } else if (cfg.deco === "bamboo") {
      for (let i = 0; i < 34; i++) {
        const s = R() < 0.5 ? -1 : 1;
        deco.push({ type: "bamboo", x: WORLD_W / 2 + s * (170 + R() * 180), y: 300 + R() * (WORLD_H - 550), s: 0.8 + R() * 0.7 });
      }
      for (let i = 0; i < 10; i++) {
        deco.push({ type: "bone", x: 100 + R() * (WORLD_W - 200), y: 400 + R() * (WORLD_H - 700), s: 0.6 + R() * 0.7 });
      }
    } else if (cfg.deco === "shukuba") {
      for (let y = WORLD_H - 250; y > 450; y -= 300) {
        deco.push({ type: "house", x: WORLD_W / 2 - 215, y, s: 0.9 + R() * 0.3 });
        deco.push({ type: "house", x: WORLD_W / 2 + 215, y: y - 150, s: 0.9 + R() * 0.3 });
      }
      for (let i = 0; i < 12; i++) {
        const sd = R() < 0.5 ? -1 : 1;
        deco.push({ type: "akachochin", x: WORLD_W / 2 + sd * (118 + R() * 50), y: 400 + R() * (WORLD_H - 700) });
      }
      for (let i = 0; i < 8; i++) {
        const sd = R() < 0.5 ? -1 : 1;
        deco.push({ type: "fence", x: WORLD_W / 2 + sd * (150 + R() * 40), y: 400 + R() * (WORLD_H - 700), s: 1 });
      }
      deco.push({ type: "torii", x: WORLD_W / 2, y: 950, s: 0.9 });
    } else { // yomi
      for (let y = WORLD_H - 260; y > 500; y -= 380) {
        deco.push({ type: "pillar", x: WORLD_W / 2 - 200, y });
        deco.push({ type: "pillar", x: WORLD_W / 2 + 200, y: y - 190 });
      }
      for (let i = 0; i < 14; i++) {
        deco.push({ type: "bone", x: 90 + R() * (WORLD_W - 180), y: 400 + R() * (WORLD_H - 700), s: 0.6 + R() * 0.8 });
      }
      deco.push({ type: "torii", x: WORLD_W / 2, y: 900, s: 1.3 });
      deco.push({ type: "torii", x: WORLD_W / 2, y: 1700, s: 1.1 });
    }

    const fog = [];
    for (let i = 0; i < 9; i++) {
      fog.push({ x: R() * WORLD_W, y: R() * WORLD_H, r: 140 + R() * 160, vx: (R() - 0.5) * 0.25, a: 0.05 + R() * 0.05 });
    }
    const wisps = [];
    for (let i = 0; i < 14; i++) {
      wisps.push({ x: R() * WORLD_W, y: R() * WORLD_H, p: R() * Math.PI * 2, s: 0.5 + R() });
    }

    // 先の道に妖怪を配置
    const enemies = [];
    const pick = () => {
      const tot = cfg.enemies.reduce((a, e) => a + e[1], 0);
      let r = R() * tot;
      for (const [ty, w] of cfg.enemies) { r -= w; if (r <= 0) return ty; }
      return cfg.enemies[0][0];
    };
    for (let i = 0; i < df.initE; i++) {
      enemies.push(makeEnemy(
        WORLD_W / 2 + (R() - 0.5) * 340,
        WORLD_H - 550 - (i % 10) * 150 - Math.floor(i / 10) * 70 - R() * 80,
        pick()
      ));
    }

    G.current = {
      t: 0, stage: si, cfg, pick,
      df,
      player: {
        x: WORLD_W / 2, y: WORLD_H - 160, r: 13,
        hp: df.pHp, maxHp: df.pHp, inv: 0, speed: 3.5, slowT: 0,
        face: -Math.PI / 2, kx: 0, ky: 0, step: 0, moving: false,
      },
      keys: {}, joy: null, firePtr: null, fireCd: 0,
      ofudas: [], enemies, bullets: [], particles: [],
      deco, fog, wisps,
      boss: null, bossDefeated: false, bossTriggered: false,
      grave: { x: WORLD_W / 2, y: 210 },
      sealing: 0,
      kills: carryRef.current.kills,
      shake: 0,
      cam: { x: 0, y: WORLD_H },
      spawnT: 0,
      msg: { text: isExtra ? "総大将が待ち構えている…" : cfg.name + " —— 北へ", t: 280 },
      startTime: performance.now(),
      extra: isExtra,
      trail: [], stones: [], bombs: [], shadows: [],
      revT: 0, altSpace: false, megaGrave: null, finalSeal: 0,
    };
    if (isExtra) {
      // 短い前座ののちすぐ宴に至る
      G.current.player.y = 1500;
    }
  };

  /* ---------- 怪音(WebAudio: 素材レスのホラー音響) ---------- */
  const audioRef = useRef(null);
  const [muted, setMuted] = useState(false);
  const mutedRef = useRef(false);
  mutedRef.current = muted;

  const initAudio = () => {
    if (audioRef.current) {
      try { audioRef.current.ac.resume(); } catch (e) {}
      return;
    }
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      const ac = new AC();
      const master = ac.createGain();
      master.gain.value = mutedRef.current ? 0 : 0.5;
      master.connect(ac.destination);

      // 低い唸りのドローン(わずかにうねる不協和)
      const droneG = ac.createGain(); droneG.gain.value = 0.05;
      const lp = ac.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 200;
      droneG.connect(lp); lp.connect(master);
      const o1 = ac.createOscillator(); o1.type = "sawtooth"; o1.frequency.value = 55;
      const o2 = ac.createOscillator(); o2.type = "sine"; o2.frequency.value = 55.8;
      const o3 = ac.createOscillator(); o3.type = "sine"; o3.frequency.value = 110.7;
      o1.connect(droneG); o2.connect(droneG); o3.connect(droneG);
      o1.start(); o2.start(); o3.start();
      const lfo = ac.createOscillator(); lfo.frequency.value = 0.07;
      const lfoG = ac.createGain(); lfoG.gain.value = 0.025;
      lfo.connect(lfoG); lfoG.connect(droneG.gain); lfo.start();

      // 遠くの風(ノイズをゆらぐバンドパスに通す)
      const nb = ac.createBuffer(1, ac.sampleRate * 2, ac.sampleRate);
      const nd = nb.getChannelData(0);
      for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
      const noise = ac.createBufferSource(); noise.buffer = nb; noise.loop = true;
      const bp = ac.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 420; bp.Q.value = 0.7;
      const ng = ac.createGain(); ng.gain.value = 0.02;
      noise.connect(bp); bp.connect(ng); ng.connect(master); noise.start();
      const wl = ac.createOscillator(); wl.frequency.value = 0.045;
      const wg = ac.createGain(); wg.gain.value = 260;
      wl.connect(wg); wg.connect(bp.frequency); wl.start();

      // ときどき鳴る不協和な鐘(短二度をぶつける)
      const evI = setInterval(() => {
        const A = audioRef.current;
        if (!A || mutedRef.current || screenRef.current !== "play") return;
        try {
          const t = A.ac.currentTime;
          const base = [392, 415.3, 466.16, 622.25][Math.floor(Math.random() * 4)];
          for (const [f, g0] of [[base, 0.05], [base * 1.06, 0.035]]) {
            const o = A.ac.createOscillator(), g2 = A.ac.createGain();
            o.type = "sine"; o.frequency.value = f;
            o.connect(g2); g2.connect(A.master);
            g2.gain.setValueAtTime(0.0001, t);
            g2.gain.exponentialRampToValueAtTime(g0, t + 0.4);
            g2.gain.exponentialRampToValueAtTime(0.0001, t + 3.2);
            o.start(t); o.stop(t + 3.4);
          }
        } catch (e) {}
      }, 9000);

      audioRef.current = { ac, master, evI };
    } catch (err) { /* 音は諦めてゲームは続行 */ }
  };

  const sfx = (kind) => {
    const A = audioRef.current;
    if (!A || mutedRef.current) return;
    try {
      const { ac, master } = A;
      const t = ac.currentTime;
      const tone = (type, f0, f1, dur, vol) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = type;
        o.frequency.setValueAtTime(f0, t);
        o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g); g.connect(master);
        o.start(t); o.stop(t + dur + 0.05);
      };
      if (kind === "shoot") tone("square", 900, 1500, 0.07, 0.045);
      else if (kind === "hit") tone("triangle", 320, 140, 0.09, 0.1);
      else if (kind === "kill") { tone("sine", 520, 120, 0.28, 0.1); tone("square", 260, 60, 0.2, 0.04); }
      else if (kind === "hurt") tone("sawtooth", 130, 55, 0.28, 0.18);
      else if (kind === "thump") tone("sine", 58, 40, 0.16, 0.28);
      else if (kind === "thump2") tone("sine", 52, 38, 0.12, 0.15);
      else if (kind === "riser") tone("sawtooth", 38, 92, 1.4, 0.14);
      else if (kind === "warp") tone("sine", 1200, 300, 0.15, 0.05);
      else if (kind === "gong") {
        for (const [f, v, d] of [[86, 0.3, 3.2], [129, 0.12, 2.4], [237, 0.07, 1.6], [345, 0.04, 1.1]]) {
          const o = ac.createOscillator(), g = ac.createGain();
          o.type = "sine"; o.frequency.value = f;
          g.gain.setValueAtTime(v, t);
          g.gain.exponentialRampToValueAtTime(0.0001, t + d);
          o.connect(g); g.connect(master);
          o.start(t); o.stop(t + d + 0.1);
        }
      }
    } catch (err) {}
  };

  const toggleMute = () => {
    setMuted((m) => {
      const nm = !m;
      mutedRef.current = nm;
      if (audioRef.current) audioRef.current.master.gain.value = nm ? 0 : 0.5;
      return nm;
    });
  };

  // アンマウント時に音を閉じる
  useEffect(() => () => {
    const A = audioRef.current;
    if (A) {
      clearInterval(A.evI);
      try { A.ac.close(); } catch (e) {}
    }
  }, []);

  /* ---------- メインループ ---------- */
  useEffect(() => {
    const cvs = canvasRef.current;
    const ctx = cvs.getContext("2d");
    let raf = 0;
    let vw = 0, vh = 0, dpr = 1;

    const resize = () => {
      const rect = wrapRef.current.getBoundingClientRect();
      vw = Math.max(1, rect.width);
      vh = Math.max(1, rect.height);
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      cvs.width = vw * dpr; cvs.height = vh * dpr;
      cvs.style.width = vw + "px"; cvs.style.height = vh + "px";
    };
    resize();
    window.addEventListener("resize", resize);

    const kd = (e) => {
      if (G.current) G.current.keys[e.key.toLowerCase()] = true;
      if (e.key === " ") { e.preventDefault(); if (G.current && screenRef.current === "play") fireAuto(); }
    };
    const ku = (e) => { if (G.current) G.current.keys[e.key.toLowerCase()] = false; };
    window.addEventListener("keydown", kd);
    window.addEventListener("keyup", ku);

    const rnd2 = (a) => (Math.random() - 0.5) * a;
    const rnd = (a) => rnd2(a * 2);
    // 点と線分の距離(伸びる首・腕の当たり判定)
    const segDist = (px, py, ax, ay, bx, by) => {
      const dx = bx - ax, dy = by - ay;
      const L2 = dx * dx + dy * dy || 1;
      let tt = ((px - ax) * dx + (py - ay) * dy) / L2;
      tt = Math.max(0, Math.min(1, tt));
      return Math.hypot(px - (ax + dx * tt), py - (ay + dy * tt));
    };
    // 呪いの要石を生成(本物3 + 偽物3〜4、見分けはつかない)
    function spawnStones(g, b) {
      g.stones = [];
      const fakes = 3 + (Math.random() < 0.5 ? 1 : 0);
      const flags = [true, true, true, ...Array(fakes).fill(false)];
      for (let i = flags.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [flags[i], flags[j]] = [flags[j], flags[i]];
      }
      for (let i = 0; i < flags.length; i++) {
        g.stones.push({
          ang: (i / flags.length) * Math.PI * 2 + Math.random() * 0.5,
          dist: 170 + Math.random() * 70,
          x: b.x, y: b.y, real: flags[i], dead: false,
        });
      }
    }
    const pt = (x, y, vx, vy, life, color, size, text) => ({ x, y, vx, vy, life, max: life, color, size, text });
    function burst(g, x, y, color, n, sp) {
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2, s = Math.random() * sp;
        g.particles.push(pt(x, y, Math.cos(a) * s, Math.sin(a) * s, 26 + Math.random() * 20, color, 2 + Math.random() * 3));
      }
    }

    /* ----- 射撃 ----- */
    function spawnOfuda(ang) {
      const g = G.current, p = g.player;
      g.ofudas.push({ x: p.x, y: p.y - 6, vx: Math.cos(ang) * 8.5, vy: Math.sin(ang) * 8.5, ang, life: 72 });
      p.face = ang;
      g.fireCd = g.df.fireCd;
      sfx("shoot");
      for (let i = 0; i < 4; i++) g.particles.push(pt(p.x, p.y, Math.cos(ang) * 2 + rnd(1), Math.sin(ang) * 2 + rnd(1), 14, "#ffe9c9", 2));
    }
    function fireAuto() {
      const g = G.current;
      if (!g || g.fireCd > 0 || g.sealing > 0) return;
      const p = g.player;
      let best = null, bd = 480;
      const cand = g.boss && g.boss.hp > 0 && !g.boss.hidden ? [...g.enemies, g.boss] : [...g.enemies];
      if (g.stones) for (const st2 of g.stones) cand.push(st2);
      for (const e of cand) {
        const d = Math.hypot(e.x - p.x, e.y - p.y);
        if (d < bd) { bd = d; best = e; }
      }
      spawnOfuda(best ? Math.atan2(best.y - p.y, best.x - p.x) : p.face);
    }
    function fireDir(dx, dy) {
      const g = G.current;
      if (!g || g.fireCd > 0 || g.sealing > 0) return;
      if (Math.hypot(dx, dy) < 0.001) return fireAuto();
      spawnOfuda(Math.atan2(dy, dx));
    }

    /* ----- ポインタ操作 ----- */
    const pos = (e) => {
      const r = cvs.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    };
    const pd = (e) => {
      if (screenRef.current !== "play" || !G.current) return;
      const g = G.current, { x, y } = pos(e);
      if (x < vw * 0.44 && !g.joy) g.joy = { id: e.pointerId, sx: x, sy: y, dx: 0, dy: 0 };
      else if (!g.firePtr) g.firePtr = { id: e.pointerId, sx: x, sy: y, t: performance.now() };
    };
    const pm = (e) => {
      const g = G.current; if (!g) return;
      const { x, y } = pos(e);
      if (g.joy && g.joy.id === e.pointerId) { g.joy.dx = x - g.joy.sx; g.joy.dy = y - g.joy.sy; }
      if (g.firePtr && g.firePtr.id === e.pointerId) { g.firePtr.cx = x; g.firePtr.cy = y; }
    };
    const pu = (e) => {
      const g = G.current; if (!g) return;
      if (g.joy && g.joy.id === e.pointerId) g.joy = null;
      if (g.firePtr && g.firePtr.id === e.pointerId) {
        const f = g.firePtr;
        const dx = (f.cx ?? f.sx) - f.sx, dy = (f.cy ?? f.sy) - f.sy;
        if (Math.hypot(dx, dy) < 22) fireAuto(); else fireDir(dx, dy);
        g.firePtr = null;
      }
    };
    cvs.addEventListener("pointerdown", pd);
    cvs.addEventListener("pointermove", pm);
    cvs.addEventListener("pointerup", pu);
    cvs.addEventListener("pointercancel", pu);

    function hurtPlayer(g, kx, ky) {
      const p = g.player;
      if (p.inv > 0 || g.sealing > 0) return;
      p.hp -= 1; p.inv = 80; p.kx = kx * 5; p.ky = ky * 5;
      g.shake = 12;
      sfx("hurt");
      burst(g, p.x, p.y, "#e34234", 16, 4);
      if (p.hp <= 0) {
        burst(g, p.x, p.y, "#f0e6d2", 40, 5);
        setResult({ kills: g.kills, time: 0, stage: g.stage });
        setTimeout(() => setScreen("over"), 500);
      }
    }

    /* ================= 更新 ================= */
    function update() {
      const g = G.current; if (!g) return;
      g.t++;
      const p = g.player;
      const cfg = g.cfg;

      /* --- 入力・移動 --- */
      let mx = 0, my = 0;
      if (g.joy) {
        const m = Math.hypot(g.joy.dx, g.joy.dy);
        if (m > 8) { mx = g.joy.dx / m; my = g.joy.dy / m; }
      }
      const K = g.keys;
      if (K["a"] || K["arrowleft"]) mx -= 1;
      if (K["d"] || K["arrowright"]) mx += 1;
      if (K["w"] || K["arrowup"]) my -= 1;
      if (K["s"] || K["arrowdown"]) my += 1;
      if (g.revT > 0) { g.revT--; mx = -mx; my = -my; }
      const mm = Math.hypot(mx, my);
      p.moving = mm > 0 && g.sealing === 0;
      if (p.slowT > 0) p.slowT--;
      const spd = p.speed * (p.slowT > 0 ? 0.55 : 1);
      if (p.moving) {
        mx /= mm; my /= mm;
        p.x += mx * spd; p.y += my * spd;
        p.face = Math.atan2(my, mx);
        p.step += 0.27;
      }
      if (p.slowT > 0 && g.t % 5 === 0) {
        g.particles.push(pt(p.x + rnd(10), p.y + rnd(10), rnd(0.4), -0.4, 20, "#bfe6ff", 2));
      }
      p.x += p.kx; p.y += p.ky; p.kx *= 0.85; p.ky *= 0.85;
      p.x = Math.max(36, Math.min(WORLD_W - 36, p.x));
      p.y = Math.max(140, Math.min(WORLD_H - 40, p.y));
      if (p.inv > 0) p.inv--;
      if (g.fireCd > 0) g.fireCd--;
      if (g.msg.t > 0) g.msg.t--;

      /* --- ボス出現 --- */
      if (!g.bossTriggered && p.y < (g.extra ? 1250 : 900)) {
        g.bossTriggered = true;
        g.boss = makeBoss(cfg.boss);
        g.boss.hp = g.boss.maxHp = Math.round(cfg.boss.hp * g.df.bossHp);
        g.msg = { text: cfg.boss.name + "が現れた…！", t: 240 };
        g.shake = 14;
        sfx("riser");
      }

      /* --- 雑魚スポーン --- */
      g.spawnT++;
      const bossFight = g.boss && g.boss.hp > 0;
      const cap = bossFight ? g.df.bossCap : g.df.cap;
      const itv = (bossFight ? g.df.bossItv : Math.max(52, 78 - g.stage * 8)) * (bossFight ? 1 : g.df.spawnItv);
      if (g.spawnT > itv && g.enemies.length < cap && g.sealing === 0 && !g.bossDefeated && g.finalSeal === 0 && !(g.boss && g.boss.dying > 0)) {
        g.spawnT = 0;
        const a = Math.random() * Math.PI * 2;
        const d = 330 + Math.random() * 130;
        const x = Math.max(40, Math.min(WORLD_W - 40, p.x + Math.cos(a) * d));
        const y = Math.max(160, Math.min(WORLD_H - 60, p.y + Math.sin(a) * d - 60));
        g.enemies.push(makeEnemy(x, y, g.pick()));
        burst(g, x, y, "#6b4fa0", 8, 2);
      }

      /* --- お札 --- */
      for (const o of g.ofudas) {
        let best = null, bd = 150;
        const cand = bossFight ? [...g.enemies, g.boss] : g.enemies;
        for (const e of cand) {
          const d = Math.hypot(e.x - o.x, e.y - o.y);
          if (d < bd) { bd = d; best = e; }
        }
        if (best) {
          const ta = Math.atan2(best.y - o.y, best.x - o.x);
          let da = ta - o.ang;
          while (da > Math.PI) da -= Math.PI * 2;
          while (da < -Math.PI) da += Math.PI * 2;
          o.ang += Math.max(-0.05, Math.min(0.05, da));
          o.vx = Math.cos(o.ang) * 8.5; o.vy = Math.sin(o.ang) * 8.5;
        }
        o.x += o.vx; o.y += o.vy; o.life--;
        if (g.t % 2 === 0) g.particles.push(pt(o.x, o.y, rnd(0.5), rnd(0.5), 12, "#8be0c8", 2));
      }

      /* --- 妖怪AI --- */
      for (const e of g.enemies) {
        const dx = p.x - e.x, dy = p.y - e.y, d = Math.hypot(dx, dy) || 1;
        e.ph += 0.08; e.st++;
        let vx = 0, vy = 0;

        if (e.type === "wisp") {
          vx = (dx / d) * e.sp + Math.cos(e.ph * 2) * 0.9;
          vy = (dy / d) * e.sp + Math.sin(e.ph * 1.6) * 0.9;
        } else if (e.type === "shade") {
          const perp = Math.sin(e.ph) * 1.1;
          vx = (dx / d) * e.sp + (-dy / d) * perp;
          vy = (dy / d) * e.sp + (dx / d) * perp;
        } else if (e.type === "crawler") {
          vx = (dx / d) * e.sp; vy = (dy / d) * e.sp;
        } else if (e.type === "nurikabe") {
          vx = (dx / d) * e.sp; vy = (dy / d) * e.sp;
        } else if (e.type === "chochin") {
          // 一定距離を保って火弾
          const want = 210;
          const dir = d > want + 30 ? 1 : d < want - 30 ? -1 : 0;
          vx = (dx / d) * e.sp * dir + Math.cos(e.ph) * 0.5;
          vy = (dy / d) * e.sp * dir + Math.sin(e.ph) * 0.5;
          e.shootT++;
          if (e.shootT > 115 && d < 400) {
            e.shootT = 0;
            const a = Math.atan2(dy, dx);
            g.bullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 2.7, vy: Math.sin(a) * 2.7, r: 5, life: 200, c: "#e3a134" });
            burst(g, e.x, e.y, "#e3a134", 5, 1.5);
          }
        } else if (e.type === "kasa") {
          // 溜め → 跳躍
          const cyc = e.st % 95;
          if (cyc === 50 && d < 420) {
            const a = Math.atan2(dy, dx);
            e.hvx = Math.cos(a) * 5.4; e.hvy = Math.sin(a) * 5.4;
          }
          e.hvx *= 0.94; e.hvy *= 0.94;
          vx = e.hvx; vy = e.hvy;
        } else if (e.type === "tanuki") {
          // よたよたジグザグ接近
          const perp = Math.sin(e.ph * 1.4) * 1.4;
          vx = (dx / d) * e.sp + (-dy / d) * perp;
          vy = (dy / d) * e.sp + (dx / d) * perp;
        } else if (e.type === "leaf") {
          // ひらひら高速接近
          vx = (dx / d) * e.sp + Math.cos(e.ph * 3) * 1.2;
          vy = (dy / d) * e.sp + Math.sin(e.ph * 2.4) * 1.2;
        } else if (e.type === "rokurokubi") {
          // 胴は距離を保ち、首を伸ばして噛みつく
          const cyc = e.st % 150;
          if (cyc < 100) {
            const want = 230;
            const dir = d > want + 30 ? 1 : d < want - 40 ? -0.7 : 0;
            vx = (dx / d) * e.sp * dir;
            vy = (dy / d) * e.sp * dir;
            e.ext *= 0.85;
            e.na = Math.atan2(dy, dx);
          } else if (cyc < 115) {
            if (cyc === 100) e.na = Math.atan2(dy, dx); // 狙い固定
            e.ext = Math.min(1, (cyc - 100) / 12);
          } else if (cyc < 132) {
            e.ext = 1;
          } else {
            e.ext = Math.max(0, 1 - (cyc - 132) / 16);
          }
          e.hx = e.x + Math.cos(e.na) * e.ext * 175;
          e.hy = e.y + Math.sin(e.na) * e.ext * 175;
          // 頭部の接触判定
          const hd = Math.hypot(p.x - e.hx, p.y - e.hy);
          if (hd < 11 + p.r) hurtPlayer(g, (p.x - e.hx) / (hd || 1), (p.y - e.hy) / (hd || 1));
        } else if (e.type === "honemusha") {
          // 歩み寄り → 踏み込み斬り
          if (e.lunge > 0) e.lunge--;
          const cyc = e.st % 120;
          if (cyc === 100 && d < 220) {
            const a = Math.atan2(dy, dx);
            e.dvx = Math.cos(a) * 5.8; e.dvy = Math.sin(a) * 5.8;
            e.lunge = 20;
            burst(g, e.x, e.y, "#e8e2d0", 5, 2);
          }
          e.dvx *= 0.9; e.dvy *= 0.9;
          vx = (dx / d) * e.sp + e.dvx;
          vy = (dy / d) * e.sp + e.dvy;
        } else if (e.type === "namakubi") {
          // ゆらゆら漂い、周期的に瞬間移動で忍び寄る
          vx = (dx / d) * e.sp + Math.cos(e.ph) * 0.6;
          vy = (dy / d) * e.sp + Math.sin(e.ph * 0.8) * 0.6;
          const cyc = e.st % 160;
          if (cyc === 120) {
            burst(g, e.x, e.y, "#6b4fa0", 10, 2.5); // 消える
            const a = Math.random() * Math.PI * 2;
            const td = 100 + Math.random() * 60;
            e.x = Math.max(30, Math.min(WORLD_W - 30, p.x + Math.cos(a) * td));
            e.y = Math.max(150, Math.min(WORLD_H - 30, p.y + Math.sin(a) * td));
            burst(g, e.x, e.y, "#e34234", 10, 2.5); // 現れる
            sfx("warp");
          }
        } else if (e.type === "yukionna") {
          // 遠間から三方向の氷礫
          const want = 250;
          const dir = d > want + 30 ? 1 : d < want - 30 ? -1 : 0;
          vx = (dx / d) * e.sp * dir + Math.cos(e.ph * 0.7) * 0.4;
          vy = (dy / d) * e.sp * dir + Math.sin(e.ph * 0.7) * 0.4;
          e.shootT++;
          if (e.shootT > 145 && d < 430) {
            e.shootT = 0;
            const a = Math.atan2(dy, dx);
            for (const off of [-0.3, 0, 0.3]) {
              g.bullets.push({ x: e.x, y: e.y, vx: Math.cos(a + off) * 2.2, vy: Math.sin(a + off) * 2.2, r: 5, life: 220, c: "#bfe6ff", slow: true });
            }
            burst(g, e.x, e.y, "#bfe6ff", 6, 1.5);
          }
        } else if (e.type === "kappa") {
          // 間合いを保って皿礫を投げる
          const want = 190;
          const dir = d > want + 30 ? 1 : d < want - 40 ? -0.8 : 0;
          vx = (dx / d) * e.sp * dir + Math.cos(e.ph) * 0.4;
          vy = (dy / d) * e.sp * dir + Math.sin(e.ph) * 0.4;
          e.shootT++;
          if (e.shootT > 125 && d < 420) {
            e.shootT = 0;
            const a = Math.atan2(dy, dx);
            g.bullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 3.0, vy: Math.sin(a) * 3.0, r: 5, life: 200, c: "#7fc86a" });
            burst(g, e.x, e.y, "#7fc86a", 5, 1.5);
          }
        } else if (e.type === "dorotabo") {
          // 地表を這う → 潜行して足元から出現
          const cyc = e.st % 210;
          if (cyc < 120) {
            e.sub = false;
            vx = (dx / d) * e.sp; vy = (dy / d) * e.sp;
          } else if (cyc === 120) {
            e.sub = true;
            burst(g, e.x, e.y, "#4a3a28", 12, 2.5);
          } else if (cyc < 172) {
            // 地中を速く移動(無敵・接触なし)
            vx = (dx / d) * 2.4; vy = (dy / d) * 2.4;
          } else if (cyc === 172) {
            e.sub = false;
            burst(g, e.x, e.y, "#4a3a28", 16, 3.5);
            g.shake = Math.max(g.shake, 5);
          }
        } else if (e.type === "tengu") {
          // 上空の間合いから羽団扇の突風、時折すばやく横滑り
          const want = 260;
          const dir = d > want + 30 ? 1 : d < want - 30 ? -1 : 0;
          vx = (dx / d) * e.sp * dir + Math.cos(e.ph * 0.8) * 0.6;
          vy = (dy / d) * e.sp * dir + Math.sin(e.ph * 0.8) * 0.6;
          if (e.st % 95 === 0) {
            e.kx += (-dy / d) * (Math.random() < 0.5 ? 7 : -7);
            e.ky += (dx / d) * (Math.random() < 0.5 ? 7 : -7);
          }
          e.shootT++;
          if (e.shootT > 140 && d < 500) {
            e.shootT = 0;
            const a = Math.atan2(dy, dx);
            for (const off of [-0.22, 0, 0.22]) {
              g.bullets.push({ x: e.x, y: e.y, vx: Math.cos(a + off) * 3.6, vy: Math.sin(a + off) * 3.6, r: 5, life: 180, c: "#dfe8f0" });
            }
            burst(g, e.x, e.y, "#dfe8f0", 8, 2.5);
          }
        } else if (e.type === "kasha") {
          // 炎を撒きながら旋回 → 体当たり
          if (e.mode === 0) {
            const orbit = 2.6;
            vx = (dx / d) * (d > 170 ? e.sp : 0) + (-dy / d) * orbit;
            vy = (dy / d) * (d > 170 ? e.sp : 0) + (dx / d) * orbit;
            if (e.st % 100 === 90) {
              e.mode = 1;
              const a = Math.atan2(dy, dx);
              e.dvx = Math.cos(a) * 7.5; e.dvy = Math.sin(a) * 7.5;
              burst(g, e.x, e.y, "#ff8a3c", 8, 3);
            }
          } else {
            e.dvx *= 0.955; e.dvy *= 0.955;
            vx = e.dvx; vy = e.dvy;
            if (Math.hypot(e.dvx, e.dvy) < 1.5) e.mode = 0;
          }
          if (g.t % 3 === 0) {
            g.particles.push(pt(e.x + rnd(8), e.y + rnd(8), rnd(0.6), -0.8, 22, Math.random() < 0.5 ? "#ff8a3c" : "#ffb54a", 3));
          }
        } else if (e.type === "tenaga") {
          // 遠間に立ち、長い腕で掴みかかる
          const cyc = e.st % 125;
          if (cyc < 68) {
            const want = 265;
            const dir = d > want + 30 ? 1 : d < want - 40 ? -0.7 : 0;
            vx = (dx / d) * e.sp * dir;
            vy = (dy / d) * e.sp * dir;
            e.ext *= 0.85;
            e.na = Math.atan2(dy, dx);
          } else if (cyc < 82) {
            if (cyc === 68) e.na = Math.atan2(dy, dx);
            e.ext = Math.min(1, (cyc - 68) / 11);
          } else if (cyc < 102) {
            e.ext = 1;
            e.na += Math.sin((cyc - 82) * 0.32) * 0.012; // わずかに揺れて追う
          } else {
            e.ext = Math.max(0, 1 - (cyc - 102) / 18);
          }
          e.hx = e.x + Math.cos(e.na) * e.ext * 235;
          e.hy = e.y + Math.sin(e.na) * e.ext * 235;
          const hd = Math.hypot(p.x - e.hx, p.y - e.hy);
          if (hd < 12 + p.r) hurtPlayer(g, (p.x - e.hx) / (hd || 1), (p.y - e.hy) / (hd || 1));
        } else if (e.type === "tsuchigumo") {
          // 横這いで間合いを詰め、蜘蛛の糸を吐く
          const perp = Math.sin(e.ph * 1.2) * 2.0;
          const dir = d > 200 ? 1 : d < 140 ? -0.5 : 0;
          vx = (dx / d) * e.sp * dir + (-dy / d) * perp;
          vy = (dy / d) * e.sp * dir + (dx / d) * perp;
          e.shootT++;
          if (e.shootT > 130 && d < 400) {
            e.shootT = 0;
            const a = Math.atan2(dy, dx);
            g.bullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 2.4, vy: Math.sin(a) * 2.4, r: 5, life: 200, c: "#e6e2da", slow: true });
            burst(g, e.x, e.y, "#e6e2da", 5, 1.5);
          }
        } else if (e.type === "wara") {
          // ふらふらと歩み寄る(倒すと呪詛が弾ける)
          vx = (dx / d) * e.sp + Math.cos(e.ph * 1.6) * 0.5;
          vy = (dy / d) * e.sp + Math.sin(e.ph * 1.3) * 0.5;
        } else if (e.type === "ittan") {
          // 高速で大きく舞い、周期的にすれ違いざまの突撃
          const cyc = e.st % 120;
          if (cyc < 75) {
            // 距離170あたりを保って旋回
            const orbit = 2.4 * (e.ph % (Math.PI * 4) < Math.PI * 2 ? 1 : -1);
            vx = (dx / d) * (d > 200 ? e.sp : d < 140 ? -e.sp * 0.5 : 0) + (-dy / d) * orbit;
            vy = (dy / d) * (d > 200 ? e.sp : d < 140 ? -e.sp * 0.5 : 0) + (dx / d) * orbit;
          } else {
            // プレイヤーを突き抜ける滑空
            if (cyc === 75) {
              const a = Math.atan2(dy, dx);
              e.dvx2 = Math.cos(a) * 5.2; e.dvy2 = Math.sin(a) * 5.2;
            }
            vx = e.dvx2 || 0; vy = e.dvy2 || 0;
          }
          // 帯のための軌跡
          e.trail.push({ x: e.x, y: e.y });
          if (e.trail.length > 12) e.trail.shift();
        } else if (e.type === "kamaitachi") {
          // 旋回 → 高速突進
          if (e.mode === 0) {
            const orbit = 1.6;
            vx = (dx / d) * (d > 190 ? e.sp : 0) + (-dy / d) * orbit;
            vy = (dy / d) * (d > 190 ? e.sp : 0) + (dx / d) * orbit;
            if (e.st % 110 === 100) {
              e.mode = 1;
              const a = Math.atan2(dy, dx);
              e.dvx = Math.cos(a) * 7; e.dvy = Math.sin(a) * 7;
              burst(g, e.x, e.y, "#dfe8d6", 6, 2);
            }
          } else {
            e.dvx *= 0.955; e.dvy *= 0.955;
            vx = e.dvx; vy = e.dvy;
            if (Math.hypot(e.dvx, e.dvy) < 1.4) e.mode = 0;
          }
        }

        e.x += vx + e.kx; e.y += vy + e.ky;
        const fr = e.type === "nurikabe" ? 0.6 : 0.82;
        e.kx *= fr; e.ky *= fr;
        e.x = Math.max(20, Math.min(WORLD_W - 20, e.x));
        e.y = Math.max(150, Math.min(WORLD_H - 30, e.y));
        if (e.flash > 0) e.flash--;
        if (d < e.r + p.r && !e.sub) hurtPlayer(g, -dx / d, -dy / d);
      }

      /* --- お札 × 敵 --- */
      for (const o of g.ofudas) {
        if (o.life <= 0) continue;
        const spawnQueue = [];
        for (const e of g.enemies) {
          if (e.hp <= 0 || e.sub) continue;
          let hit = Math.hypot(e.x - o.x, e.y - o.y) < e.r + 10;
          // ろくろ首は伸びた頭部にも当たる
          if (!hit && (e.type === "rokurokubi" || e.type === "tenaga") && e.ext > 0.2) {
            hit = Math.hypot(e.hx - o.x, e.hy - o.y) < 21;
          }
          if (hit) {
            e.hp--; e.flash = 8; o.life = 0;
            const kb = e.type === "nurikabe" ? 0.12 : 0.4;
            e.kx += o.vx * kb; e.ky += o.vy * kb;
            burst(g, o.x, o.y, "#8be0c8", 8, 3);
            sfx(e.hp <= 1 ? "kill" : "hit");
            if (e.hp <= 0) {
              g.kills++;
              burst(g, e.x, e.y, e.type === "crawler" || e.type === "nurikabe" ? "#a06be0" : "#8be0c8", 16, 3.5);
              g.particles.push(pt(e.x, e.y, 0, -1.1, 60, "#e34234", 22, "滅"));
              // 呪い藁人形は滅すると呪詛が弾ける
              if (e.type === "wara") {
                for (let i = 0; i < 6; i++) {
                  const a = (i / 6) * Math.PI * 2 + 0.26;
                  g.bullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 1.8, vy: Math.sin(a) * 1.8, r: 4, life: 150, c: "#c93a2e" });
                }
              }
              // 化け狸は木の葉に化けて分裂
              if (e.type === "tanuki") {
                for (const s of [-1, 1]) {
                  spawnQueue.push(makeEnemy(e.x + s * 22, e.y - 6, "leaf"));
                }
                g.particles.push(pt(e.x, e.y - 20, 0, -0.8, 50, "#9dc06a", 16, "化"));
              }
            }
            break;
          }
        }
        for (const s of spawnQueue) g.enemies.push(s);
        // 呪いの要石(本物/偽物)
        if (o.life > 0 && g.stones.length > 0) {
          for (const st2 of g.stones) {
            if (st2.dead) continue;
            if (Math.hypot(st2.x - o.x, st2.y - o.y) < 22) {
              o.life = 0;
              st2.dead = true;
              if (st2.real) {
                burst(g, st2.x, st2.y, "#8be0c8", 16, 4);
                g.particles.push(pt(st2.x, st2.y, 0, -1, 60, "#8be0c8", 20, "破"));
                sfx("kill");
                const left = g.stones.filter((q) => q.real && !q.dead).length;
                if (left === 0) {
                  const b2 = g.boss;
                  if (b2) {
                    b2.barrierDown = 1800; // 約30秒
                    g.stones = [];
                    g.msg = { text: "結界が剥がれた！今だ——(三十秒)", t: 260 };
                    sfx("gong");
                    g.shake = 12;
                  }
                } else {
                  g.msg = { text: `要石を破壊——残り ${left}`, t: 140 };
                }
              } else {
                // 偽物: 爆発して弾幕
                burst(g, st2.x, st2.y, "#e34234", 20, 5);
                g.particles.push(pt(st2.x, st2.y, 0, -1, 60, "#e34234", 20, "呪"));
                sfx("hurt");
                g.shake = 10;
                for (let i2 = 0; i2 < 12; i2++) {
                  const a2 = (i2 / 12) * Math.PI * 2;
                  g.bullets.push({ x: st2.x, y: st2.y, vx: Math.cos(a2) * 2.6, vy: Math.sin(a2) * 2.6, r: 5, life: 200, c: "#e34234" });
                }
              }
              break;
            }
          }
          g.stones = g.stones.filter((q) => !q.dead);
        }
        if (o.life > 0 && bossFight && !g.boss.hidden) {
          const b = g.boss;
          const headHit = b.type === "oorokuro" && Math.hypot(b.hx - o.x, b.hy - o.y) < 24;
          if (headHit || Math.hypot(b.x - o.x, b.y - o.y) < b.r + 10) {
            o.life = 0;
            if (b.type === "nurarihyon" && b.reflect > 0) {
              // お札返し: 高速で跳ね返ってくる
              const ra = Math.atan2(p.y - b.y, p.x - b.x);
              g.bullets.push({ x: b.x, y: b.y, vx: Math.cos(ra) * 5.4, vy: Math.sin(ra) * 5.4, r: 6, life: 160, c: "#ffd23f" });
              burst(g, o.x, o.y, "#ffd23f", 8, 3);
              sfx("warp");
            } else if (b.type === "nurarihyon" && b.phase === 2 && b.barrierDown <= 0) {
              // 第二形態の常時バリア: 直接攻撃は効かない
              burst(g, o.x, o.y, "#a06be0", 6, 2.5);
            } else {
              b.hp--; b.flash = 6;
              burst(g, o.x, o.y, "#8be0c8", 10, 3.5);
              sfx("hit");
            }
            if (b.hp <= 0) {
              if (b.type === "nurarihyon" && b.phase === 1) {
                // 全回復して第二形態へ——真の力を解放
                b.phase = 2;
                b.hp = b.maxHp = 80;
                b.state = "hover"; b.st = 0;
                b.reflect = 0; b.hidden = false;
                g.altSpace = true;
                g.bullets.length = 0;
                g.shadows.length = 0;
                g.bombs.length = 0;
                spawnStones(g, b);
                g.shake = 24;
                sfx("gong");
                sfx("riser");
                burst(g, b.x, b.y, "#e34234", 60, 7);
                burst(g, b.x, b.y, "#ffd23f", 40, 5);
                g.particles.push(pt(b.x, b.y, 0, -0.8, 120, "#e34234", 40, "真"));
                g.msg = { text: "真の力——領域『百鬼の座敷』展開！要石を破壊せよ", t: 360 };
              } else if (b.type === "nurarihyon") {
                // 真の撃破——崩壊演出へ
                b.dying = 150;
                b.hp = 0;
                g.bullets.length = 0;
                g.enemies.length = 0;
                g.stones = [];
                g.shake = 26;
                sfx("gong");
                g.msg = { text: "ぬらりひょん、崩壊——", t: 200 };
              } else {
                sfx("gong");
                g.bossDefeated = true;
                g.kills++;
                g.shake = 22;
                burst(g, b.x, b.y, "#a06be0", 60, 6);
                burst(g, b.x, b.y, "#e34234", 40, 4);
                g.particles.push(pt(b.x, b.y, 0, -0.8, 110, "#f0e6d2", 44, "祓"));
                g.bullets.length = 0;
                g.enemies.length = 0;
                g.msg = { text: "結界が解けた——墓に触れ、封印せよ", t: 320 };
              }
            }
          }
        }
      }
      g.enemies = g.enemies.filter((e) => e.hp > 0);
      g.ofudas = g.ofudas.filter((o) => o.life > 0);

      /* --- ボスAI --- */
      if (bossFight) {
        if (g.t % 55 === 0) sfx("thump");
        else if (g.t % 55 === 20) sfx("thump2");
        const b = g.boss;
        b.ph += 0.05; b.st++;
        if (b.flash > 0) b.flash--;
        const phase2 = b.hp < b.maxHp * 0.5;
        const aimAng = Math.atan2(p.y - b.y, p.x - b.x);
        const bc = b.bulletC;

        if (b.type === "nureonna" && b.segs) {
          b.segs[0].x += (b.x - b.segs[0].x) * 0.35;
          b.segs[0].y += (b.y - b.segs[0].y) * 0.35;
          for (let i = 1; i < b.segs.length; i++) {
            b.segs[i].x += (b.segs[i - 1].x - b.segs[i].x) * 0.3;
            b.segs[i].y += (b.segs[i - 1].y - b.segs[i].y) * 0.3;
          }
        }
        if (b.type === "oorokuro") {
          // 首の攻撃中でなければ頭は胴に戻る
          if (b.state !== "neckThrust" && b.state !== "neckSweep") b.nExt *= 0.82;
          b.hx = b.x + Math.cos(b.nAng) * 360 * b.nExt;
          b.hy = b.y - 24 + Math.sin(b.nAng) * 360 * b.nExt;
          // 伸びた首(線分)への接触
          if (b.nExt > 0.15 && segDist(p.x, p.y, b.x, b.y - 16, b.hx, b.hy) < 14 + p.r) {
            const dd2 = Math.hypot(p.x - b.hx, p.y - b.hy) || 1;
            hurtPlayer(g, (p.x - b.hx) / dd2, (p.y - b.hy) / dd2);
          }
        }

        if (b.type === "nurarihyon") {
          if (b.reflect > 0) b.reflect--;
          if (b.fan > 0) b.fan--;
          if (b.barrierDown > 0) {
            b.barrierDown--;
            if (b.barrierDown === 0 && b.hp > 0 && b.phase === 2) {
              spawnStones(g, b);
              g.msg = { text: "呦いの要石が再び現れた…", t: 200 };
            }
          }
        }

        if (b.state === "enter") {
          b.y += (520 - b.y) * 0.04;
          if (b.st > 90) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "hover") {
          b.tx = p.x + Math.cos(b.ph) * 130;
          b.ty = Math.max(300, p.y - 240) + Math.sin(b.ph * 1.3) * 40;
          b.x += (b.tx - b.x) * 0.02;
          b.y += (b.ty - b.y) * 0.02;
          const wait = b.type === "nurarihyon" ? (b.phase === 2 ? 80 : 105) : phase2 ? 95 : 135;
          if (b.st > wait) {
            b.st = 0;
            if (b.type === "nurarihyon") {
              // 番外ボスはランダムに技を繰り出す(直前と同じは避ける)
              let np = NURA_PATS[Math.floor(Math.random() * NURA_PATS.length)];
              while (np === b.lastPat) np = NURA_PATS[Math.floor(Math.random() * NURA_PATS.length)];
              b.lastPat = np;
              b.state = np;
            } else {
              const plist = phase2 ? b.patterns2 : b.patterns;
              b.pi = (b.pi + 1) % plist.length;
              b.state = plist[b.pi];
            }
          }
        } else if (b.state === "ring") {
          if (b.st % 26 === 1) {
            const n = phase2 ? 18 : 13;
            b.ang += 0.35;
            for (let i = 0; i < n; i++) {
              const a = b.ang + (i / n) * Math.PI * 2;
              g.bullets.push({ x: b.x, y: b.y, vx: Math.cos(a) * 2.3, vy: Math.sin(a) * 2.3, r: 6, life: 260, c: bc });
            }
            g.shake = Math.max(g.shake, 4);
          }
          if (b.st > (phase2 ? 110 : 80)) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "aimed") {
          if (b.st % 22 === 1 && b.st < 90) {
            for (const off of [-0.28, 0, 0.28]) {
              const a = aimAng + off;
              g.bullets.push({ x: b.x, y: b.y, vx: Math.cos(a) * 3.4, vy: Math.sin(a) * 3.4, r: 5, life: 220, c: bc });
            }
          }
          if (b.st > 100) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "charge") {
          if (b.st < 46) { b.tx = p.x; b.ty = p.y; }
          else if (b.st === 46) {
            const a = Math.atan2(b.ty - b.y, b.tx - b.x);
            const spd = phase2 ? 9.5 : 8;
            b.dashVX = Math.cos(a) * spd; b.dashVY = Math.sin(a) * spd;
            g.shake = 10;
          } else {
            b.x += b.dashVX; b.y += b.dashVY;
            b.dashVX *= 0.965; b.dashVY *= 0.965;
            if (g.t % 2 === 0) burst(g, b.x + rnd(30), b.y + rnd(30), "#6b4fa0", 2, 1.5);
            if (Math.hypot(b.dashVX, b.dashVY) < 1.2 || b.st > 130) { b.state = "hover"; b.st = 0; }
          }
        } else if (b.state === "wave") {
          // うねる波状弾
          if (b.st % 8 === 1 && b.st < 90) {
            const a = aimAng + Math.sin(b.st * 0.18) * 0.85;
            g.bullets.push({ x: b.x, y: b.y, vx: Math.cos(a) * 2.8, vy: Math.sin(a) * 2.8, r: 6, life: 240, c: bc });
            if (phase2) {
              const a2 = aimAng - Math.sin(b.st * 0.18) * 0.85;
              g.bullets.push({ x: b.x, y: b.y, vx: Math.cos(a2) * 2.8, vy: Math.sin(a2) * 2.8, r: 6, life: 240, c: bc });
            }
          }
          if (b.st > 100) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "spiral") {
          if (b.st % 5 === 1 && b.st < 110) {
            b.ang += 0.27;
            for (const off of phase2 ? [0, Math.PI * 2 / 3, Math.PI * 4 / 3] : [0, Math.PI]) {
              const a = b.ang + off;
              g.bullets.push({ x: b.x, y: b.y, vx: Math.cos(a) * 2.2, vy: Math.sin(a) * 2.2, r: 5, life: 260, c: bc });
            }
          }
          if (b.st > 120) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "summon") {
          if (b.st === 30) {
            for (let i = 0; i < (phase2 ? 4 : 3); i++) {
              const a = Math.random() * Math.PI * 2;
              const x = b.x + Math.cos(a) * 90, y = b.y + Math.sin(a) * 90;
              g.enemies.push(makeEnemy(x, y, "wisp"));
              burst(g, x, y, "#7fd6a8", 8, 2.5);
            }
            g.shake = 6;
          }
          if (b.st > 60) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "slam") {
          // 予備動作 → 全方位衝撃
          if (b.st < 55) {
            b.y += Math.sin(b.st * 0.3) * 0.8 - 0.5;
          } else if (b.st === 55) {
            const n = phase2 ? 24 : 18;
            for (let i = 0; i < n; i++) {
              const a = (i / n) * Math.PI * 2;
              g.bullets.push({ x: b.x, y: b.y, vx: Math.cos(a) * 3.1, vy: Math.sin(a) * 3.1, r: 6, life: 240, c: bc });
            }
            g.shake = 16;
            burst(g, b.x, b.y, bc, 24, 5);
          }
          if (b.st > 80) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "cross") {
          // 十字裂破: 回転する弾の腕
          if (b.st % 7 === 1 && b.st < 95) {
            const arms = phase2 ? 6 : 4;
            b.ang += 0.06;
            for (let i = 0; i < arms; i++) {
              const a = b.ang + (i / arms) * Math.PI * 2;
              g.bullets.push({ x: b.x, y: b.y, vx: Math.cos(a) * 2.7, vy: Math.sin(a) * 2.7, r: 5, life: 240, c: bc });
            }
          }
          if (b.st > 105) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "rain") {
          // 骨の雨: 頭上から降り注ぐ
          if (b.st % 9 === 1 && b.st < 100) {
            const rx = p.x + (Math.random() - 0.5) * 460;
            g.bullets.push({ x: rx, y: p.y - 360, vx: (Math.random() - 0.5) * 0.8, vy: 3.3, r: 5, life: 200, c: bc });
          }
          if (b.st > 115) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "snipe") {
          // 狙撃: 照準線のあと高速弾
          const cyc = b.st % 32;
          if (cyc === 8) b.snipeA = aimAng; // 照準固定
          if (cyc === 30 && b.st < 100) {
            const a = b.snipeA;
            g.bullets.push({ x: b.x, y: b.y, vx: Math.cos(a) * 7.4, vy: Math.sin(a) * 7.4, r: 6, life: 130, c: bc });
            g.shake = Math.max(g.shake, 6);
            burst(g, b.x + Math.cos(a) * b.r, b.y + Math.sin(a) * b.r, bc, 6, 3);
          }
          if (b.st > 105) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "homing") {
          // 追い縋る鬼火: 緩やかに曲がって追ってくる
          if (b.st % 20 === 1 && b.st < (phase2 ? 110 : 80)) {
            const a = Math.random() * Math.PI * 2;
            g.bullets.push({ x: b.x + Math.cos(a) * 30, y: b.y + Math.sin(a) * 30, vx: Math.cos(a) * 2.0, vy: Math.sin(a) * 2.0, r: 6, life: 260, c: bc, hom: 110 });
          }
          if (b.st > (phase2 ? 120 : 90)) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "split") {
          // 分裂弾: 大玉が途中で三方向に割れる
          if (b.st % 26 === 1 && b.st < 85) {
            const a = aimAng + (Math.random() - 0.5) * 0.4;
            g.bullets.push({ x: b.x, y: b.y, vx: Math.cos(a) * 2.6, vy: Math.sin(a) * 2.6, r: 9, life: 220, c: bc, split: 42 });
          }
          if (b.st > 95) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "flood") {
          // 水鏡の波紋: 足元に印が出て、そこから全方位に弾ける
          if (b.st === 12 || b.st === 62) { b.fx = p.x; b.fy = p.y; }
          if (b.st === 50 || b.st === 100) {
            const n = phase2 ? 16 : 12;
            for (let i = 0; i < n; i++) {
              const a = (i / n) * Math.PI * 2;
              g.bullets.push({ x: b.fx, y: b.fy, vx: Math.cos(a) * 2.4, vy: Math.sin(a) * 2.4, r: 5, life: 220, c: bc });
            }
            g.shake = Math.max(g.shake, 8);
            burst(g, b.fx, b.fy, bc, 18, 4);
          }
          if (b.st > 112) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "neckThrust") {
          // 首刺し: 首が高速で伸びて突く(三連)
          const cyc = b.st % 42;
          if (cyc === 8) b.nAng = aimAng; // 狙い固定
          if (cyc < 8) b.nExt *= 0.8;
          else if (cyc < 18) b.nExt = Math.min(1, (cyc - 8) / 8);
          else if (cyc < 26) b.nExt = 1;
          else b.nExt = Math.max(0, 1 - (cyc - 26) / 14);
          if (b.st > 124) { b.state = "hover"; b.st = 0; b.nExt = 0; }
        } else if (b.state === "neckSweep") {
          // 大薙ぎ: 伸ばした首で扇状に薙ぎ払う
          if (b.st === 6) b.nAng = aimAng - 1.0;
          if (b.st > 6 && b.st <= 26) b.nExt = Math.min(1, (b.st - 6) / 20) * 0.85;
          else if (b.st > 26 && b.st <= 96) {
            b.nExt = 0.85;
            b.nAng += (2.0 / 70) * (phase2 ? 1.3 : 1);
            // 第二形態: 薙ぎながら頭から弾を落とす
            if (phase2 && b.st % 14 === 0) {
              const a2 = Math.atan2(p.y - b.hy, p.x - b.hx);
              g.bullets.push({ x: b.hx, y: b.hy, vx: Math.cos(a2) * 2.6, vy: Math.sin(a2) * 2.6, r: 5, life: 200, c: bc });
            }
          } else if (b.st > 96) b.nExt = Math.max(0, b.nExt - 0.06);
          if (b.st > 118) { b.state = "hover"; b.st = 0; b.nExt = 0; }
        } else if (b.state === "hairNeedles") {
          // 髪針: 五方向の扇を三度
          if (b.st % 22 === 1 && b.st < 70) {
            for (const off of [-0.5, -0.25, 0, 0.25, 0.5]) {
              const a = aimAng + off;
              g.bullets.push({ x: b.hx ?? b.x, y: b.hy ?? b.y, vx: Math.cos(a) * 3.2, vy: Math.sin(a) * 3.2, r: 4, life: 200, c: bc });
            }
          }
          if (b.st > 82) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "armCross") {
          // 両腕薙ぎ: 左右の腕が伸びて内側へ挟み込む
          const doArm = (arm, t0, dir) => {
            const cyc = b.st - t0;
            if (cyc < 0) { arm.ext *= 0.85; return; }
            if (cyc === 0) arm.ang = Math.atan2(p.y - b.y, p.x - b.x) + dir * -0.55;
            if (cyc < 12) arm.ext = Math.min(1, cyc / 10);
            else if (cyc < 44) { arm.ext = 1; arm.ang += dir * 0.024 * (phase2 ? 1.35 : 1); }
            else arm.ext = Math.max(0, arm.ext - 0.08);
          };
          doArm(b.a1, 10, 1);
          doArm(b.a2, phase2 ? 28 : 46, -1);
          for (const arm of [b.a1, b.a2]) {
            if (arm.ext > 0.15) {
              const ax = b.x + Math.cos(arm.ang) * 300 * arm.ext;
              const ay = b.y + Math.sin(arm.ang) * 300 * arm.ext;
              if (segDist(p.x, p.y, b.x, b.y, ax, ay) < 16 + p.r) {
                const dd2 = Math.hypot(p.x - b.x, p.y - b.y) || 1;
                hurtPlayer(g, (p.x - b.x) / dd2, (p.y - b.y) / dd2);
              }
            }
          }
          if (b.st > 118) { b.state = "hover"; b.st = 0; b.a1.ext = 0; b.a2.ext = 0; }
        } else if (b.state === "beam") {
          // 目から光線: 照準→視線の光束で蔩9く
          if (b.st < 45) {
            b.beamA = aimAng; // 照準中は追尾
          } else if (b.st < 100) {
            // 発射中はゆっくり追尾
            let da = aimAng - b.beamA;
            while (da > Math.PI) da -= Math.PI * 2;
            while (da < -Math.PI) da += Math.PI * 2;
            b.beamA += Math.max(-0.012, Math.min(0.012, da));
            const ex2 = b.x + Math.cos(b.beamA) * 820;
            const ey2 = b.y + Math.sin(b.beamA) * 820;
            if (segDist(p.x, p.y, b.x, b.y - 20, ex2, ey2) < 15 + p.r) {
              hurtPlayer(g, Math.cos(b.beamA + Math.PI / 2), Math.sin(b.beamA + Math.PI / 2));
            }
            if (g.t % 4 === 0) burst(g, b.x + Math.cos(b.beamA) * (60 + Math.random() * 500), b.y - 20 + Math.sin(b.beamA) * (60 + Math.random() * 500), "#ffd23f", 1, 1.5);
          }
          if (b.st > 108) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "teaBomb") {
          // お茶の爆弾: 放物線で投げて着弾で全方位に弾ける
          if (b.st === 10 || b.st === 35 || b.st === 60) {
            g.bombs.push({
              sx: b.x, sy: b.y - 30,
              tx: p.x + rnd(60), ty: p.y + rnd(60),
              t: 0, T: 55,
            });
          }
          if (b.st > 80) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "reflect") {
          // お札返し: 黄金の結界でお札を跳ね返す
          if (b.st === 1) {
            b.reflect = 190;
            g.msg = { text: "お札返し——撃つな！", t: 160 };
          }
          b.x += (p.x - b.x) * 0.006;
          b.y += (Math.max(300, p.y - 200) - b.y) * 0.006;
          if (b.st > 200) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "gyoretsu") {
          // 総大将の号令: 扇子を広げて百鬼夜行
          if (b.st === 8) b.fan = 70;
          if (b.st === 24) {
            const n2 = b.phase === 2 ? 10 : 8;
            const types = ["wisp", "leaf", "kasa"];
            for (let i = 0; i < n2; i++) {
              const a = (i / n2) * Math.PI * 2;
              const x2 = Math.max(40, Math.min(WORLD_W - 40, p.x + Math.cos(a) * 420));
              const y2 = Math.max(160, Math.min(WORLD_H - 60, p.y + Math.sin(a) * 420));
              g.enemies.push(makeEnemy(x2, y2, types[Math.floor(Math.random() * types.length)]));
              burst(g, x2, y2, "#ffd23f", 5, 2);
            }
            g.shake = 8;
            sfx("riser");
            g.msg = { text: "総大将の号令——百鬼夜行！", t: 200 };
          }
          if (b.st > 60) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "teleSlam") {
          // 死角からの急襲: 消えて足元に影→落下
          if (b.st === 8) {
            b.hidden = true;
            burst(g, b.x, b.y, "#1a1024", 20, 4);
            sfx("warp");
          }
          if (b.st > 8 && b.st < 52) {
            if (b.st < 42) { b.tx = p.x; b.ty = p.y; } // 影が追う→42で固定
          }
          if (b.st === 58) {
            b.hidden = false;
            b.x = b.tx; b.y = b.ty;
            g.shake = 16;
            sfx("thump");
            burst(g, b.x, b.y, "#ffd23f", 24, 5);
            const n2 = b.phase === 2 ? 18 : 14;
            for (let i = 0; i < n2; i++) {
              const a = (i / n2) * Math.PI * 2;
              g.bullets.push({ x: b.x, y: b.y, vx: Math.cos(a) * 2.9, vy: Math.sin(a) * 2.9, r: 5, life: 200, c: bc });
            }
            const dd3 = Math.hypot(p.x - b.x, p.y - b.y);
            if (dd3 < 95) hurtPlayer(g, (p.x - b.x) / (dd3 || 1), (p.y - b.y) / (dd3 || 1));
          }
          if (b.st > 78) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "vortex") {
          // 引力の渦: 逆に走り続けないと引き寄せられる
          if (b.st === 1) g.msg = { text: "引力の渦——離れろ！", t: 150 };
          if (b.st < 170) {
            const ddv = Math.hypot(b.x - p.x, b.y - p.y) || 1;
            const pull = 1.55;
            p.x += ((b.x - p.x) / ddv) * pull;
            p.y += ((b.y - p.y) / ddv) * pull;
            if (g.t % 3 === 0) {
              const a = Math.random() * Math.PI * 2;
              const dv = 90 + Math.random() * 160;
              g.particles.push(pt(b.x + Math.cos(a) * dv, b.y + Math.sin(a) * dv, -Math.cos(a) * 2.4, -Math.sin(a) * 2.4, 26, "#a06be0", 2.5));
            }
          }
          if (b.st > 180) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "pinball") {
          // 乱反射ダッシュ: 壁で跳ねる連続突進
          if (b.st === 1) {
            const a = aimAng;
            const spd = b.phase === 2 ? 11.5 : 10;
            b.dashVX = Math.cos(a) * spd; b.dashVY = Math.sin(a) * spd;
            b.bounces = 0;
            b.byMin = Math.max(240, p.y - 460);
            b.byMax = Math.min(WORLD_H - 100, p.y + 460);
            g.shake = 8;
          } else {
            b.x += b.dashVX; b.y += b.dashVY;
            let bounced = false;
            if (b.x < 70) { b.x = 70; b.dashVX = Math.abs(b.dashVX); bounced = true; }
            if (b.x > WORLD_W - 70) { b.x = WORLD_W - 70; b.dashVX = -Math.abs(b.dashVX); bounced = true; }
            if (b.y < b.byMin) { b.y = b.byMin; b.dashVY = Math.abs(b.dashVY); bounced = true; }
            if (b.y > b.byMax) { b.y = b.byMax; b.dashVY = -Math.abs(b.dashVY); bounced = true; }
            if (bounced) {
              b.bounces++;
              g.shake = Math.max(g.shake, 6);
              burst(g, b.x, b.y, "#ffd23f", 8, 3);
              sfx("hit");
            }
            if (g.t % 2 === 0) burst(g, b.x + rnd(26), b.y + rnd(26), "#6b4fa0", 2, 1.5);
            if (b.bounces >= (b.phase === 2 ? 6 : 4) || b.st > 260) { b.state = "hover"; b.st = 0; }
          }
        } else if (b.state === "reverse") {
          // 反転の呪い: 数秒間だけ操作が逆さま
          if (b.st === 1) {
            g.revT = 300;
            g.msg = { text: "反転の呪い！——操作が逆さまに…", t: 180 };
            burst(g, p.x, p.y, "#a06be0", 16, 4);
            sfx("warp");
          }
          if (b.st > 20) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "mirror") {
          // 合わせ鏡の迷宮: 自分の影が追ってくる
          if (b.st === 1) {
            for (const dl of [55, 95, 135]) {
              g.shadows.push({ delay: dl, life: 330 });
            }
            g.msg = { text: "合わせ鏡の迷宮——影に触れるな！", t: 200 };
            sfx("warp");
          }
          if (b.st > 20) { b.state = "hover"; b.st = 0; }
        } else if (b.state === "walls") {
          // 骨の弾列
          if (b.st % 30 === 1 && b.st < 95) {
            const px2 = Math.cos(aimAng + Math.PI / 2), py2 = Math.sin(aimAng + Math.PI / 2);
            for (let i = -3; i <= 3; i++) {
              g.bullets.push({
                x: b.x + px2 * i * 36, y: b.y + py2 * i * 36,
                vx: Math.cos(aimAng) * 2.5, vy: Math.sin(aimAng) * 2.5,
                r: 5, life: 240, c: bc,
              });
            }
            g.shake = Math.max(g.shake, 5);
          }
          if (b.st > 105) { b.state = "hover"; b.st = 0; }
        }

        b.x = Math.max(70, Math.min(WORLD_W - 70, b.x));
        b.y = Math.max(240, Math.min(WORLD_H - 100, b.y));
        const dd = Math.hypot(p.x - b.x, p.y - b.y);
        if (dd < b.r + p.r && !b.hidden) hurtPlayer(g, (p.x - b.x) / dd, (p.y - b.y) / dd);
      }

      /* --- 敵弾 --- */
      const splitChildren = [];
      for (const bl of g.bullets) {
        // 追尾弾: 一定時間だけ緩やかに曲がる
        if (bl.hom && bl.hom > 0) {
          bl.hom--;
          const ta = Math.atan2(p.y - bl.y, p.x - bl.x);
          let ca = Math.atan2(bl.vy, bl.vx);
          let da = ta - ca;
          while (da > Math.PI) da -= Math.PI * 2;
          while (da < -Math.PI) da += Math.PI * 2;
          ca += Math.max(-0.032, Math.min(0.032, da));
          const sp2 = Math.hypot(bl.vx, bl.vy);
          bl.vx = Math.cos(ca) * sp2; bl.vy = Math.sin(ca) * sp2;
        }
        // 分裂弾: 時間経過で三方向に割れる
        if (bl.split !== undefined) {
          bl.split--;
          if (bl.split <= 0) {
            const a0 = Math.atan2(bl.vy, bl.vx);
            for (const off of [-0.5, 0, 0.5]) {
              splitChildren.push({ x: bl.x, y: bl.y, vx: Math.cos(a0 + off) * 3.1, vy: Math.sin(a0 + off) * 3.1, r: 4, life: 160, c: bl.c });
            }
            burst(g, bl.x, bl.y, bl.c || "#a06be0", 8, 2.5);
            bl.life = 0;
          }
        }
        bl.x += bl.vx * g.df.blt; bl.y += bl.vy * g.df.blt; bl.life--;
        const d = Math.hypot(p.x - bl.x, p.y - bl.y);
        if (d < bl.r + p.r - 3 && bl.life > 0) {
          bl.life = 0;
          if (bl.slow) p.slowT = g.df.slowT;
          hurtPlayer(g, (p.x - bl.x) / (d || 1), (p.y - bl.y) / (d || 1));
        }
      }
      for (const c of splitChildren) g.bullets.push(c);
      g.bullets = g.bullets.filter((b) => b.life > 0 && b.x > -30 && b.x < WORLD_W + 30 && b.y > -30 && b.y < WORLD_H + 30);

      for (const q of g.particles) { q.x += q.vx; q.y += q.vy; q.vx *= 0.96; q.vy *= 0.96; q.life--; }
      g.particles = g.particles.filter((q) => q.life > 0);
      for (const f of g.fog) { f.x += f.vx; if (f.x < -f.r) f.x = WORLD_W + f.r; if (f.x > WORLD_W + f.r) f.x = -f.r; }

      /* --- 番外: 軌跡・爆弾・影・要石・崩壊・大封印 --- */
      if (g.extra) {
        // 合わせ鏡用のプレイヤー軌跡
        g.trail.push({ x: p.x, y: p.y });
        if (g.trail.length > 320) g.trail.shift();
        // お茶の爆弾
        for (const bm of g.bombs) {
          bm.t++;
          if (bm.t >= bm.T) {
            burst(g, bm.tx, bm.ty, "#7fc86a", 16, 4);
            g.shake = Math.max(g.shake, 8);
            sfx("hit");
            for (let i = 0; i < 8; i++) {
              const a = (i / 8) * Math.PI * 2 + 0.4;
              g.bullets.push({ x: bm.tx, y: bm.ty, vx: Math.cos(a) * 2.5, vy: Math.sin(a) * 2.5, r: 5, life: 190, c: "#7fc86a" });
            }
          }
        }
        g.bombs = g.bombs.filter((bm) => bm.t < bm.T);
        // 合わせ鏡の影(少し前の自分をなぞる)
        for (const sh of g.shadows) {
          sh.life--;
          const idx = g.trail.length - 1 - sh.delay;
          if (idx >= 0) {
            sh.x = g.trail[idx].x; sh.y = g.trail[idx].y;
            const d2 = Math.hypot(p.x - sh.x, p.y - sh.y);
            if (d2 < 15 + p.r && sh.life > 20 && sh.life < 300) {
              hurtPlayer(g, (p.x - sh.x) / (d2 || 1), (p.y - sh.y) / (d2 || 1));
            }
          }
        }
        g.shadows = g.shadows.filter((sh) => sh.life > 0);
        // 要石はボスの周りをゆっくり回る
        if (g.boss) {
          for (const st2 of g.stones) {
            st2.ang += 0.004;
            st2.x = Math.max(50, Math.min(WORLD_W - 50, g.boss.x + Math.cos(st2.ang) * st2.dist));
            st2.y = Math.max(200, Math.min(WORLD_H - 60, g.boss.y + Math.sin(st2.ang) * st2.dist));
          }
        }
        // 崩壊演出
        if (g.boss && g.boss.dying > 0) {
          const b = g.boss;
          b.dying--;
          if (g.t % 5 === 0) burst(g, b.x + rnd(50), b.y + rnd(60), Math.random() < 0.5 ? "#e34234" : "#ffd23f", 8, 4);
          g.shake = Math.max(g.shake, 6);
          if (b.dying <= 0) {
            burst(g, b.x, b.y, "#f0e6d2", 70, 8);
            g.particles.push(pt(b.x, b.y, 0, -0.6, 140, "#f0e6d2", 46, "祓"));
            g.megaGrave = { x: WORLD_W / 2, y: Math.max(380, Math.min(WORLD_H - 200, b.y)) };
            g.kills++;
            g.bossDefeated = true;
            g.boss = null;
            g.msg = { text: "大封印の墓が現れた——触れて完全封印せよ", t: 400 };
            sfx("gong");
          }
        }
        // 大封印
        if (g.megaGrave && g.finalSeal === 0) {
          if (Math.hypot(p.x - g.megaGrave.x, p.y - g.megaGrave.y) < 70) {
            g.finalSeal = 1;
            sfx("gong");
            g.shake = 8;
          }
        }
        if (g.finalSeal > 0) {
          g.finalSeal++;
          if (g.finalSeal === 40) burst(g, g.megaGrave.x, g.megaGrave.y, "#e34234", 40, 5);
          if (g.finalSeal > 300) {
            const elapsed = (performance.now() - g.startTime) / 1000;
            setResult({ kills: g.kills, time: elapsed, stage: 0 });
            setScreen("extraclear");
          }
        }
      }

      /* --- 封印 --- */
      if (!g.extra && g.bossDefeated && g.sealing === 0) {
        if (Math.hypot(p.x - g.grave.x, p.y - g.grave.y) < 52) { g.sealing = 1; g.shake = 6; sfx("gong"); }
      }
      if (g.sealing > 0) {
        g.sealing++;
        if (g.sealing === 30) burst(g, g.grave.x, g.grave.y, "#e34234", 30, 4);
        if (g.sealing > 160) {
          const elapsed = (performance.now() - g.startTime) / 1000;
          carryRef.current = { kills: g.kills, timeAcc: carryRef.current.timeAcc + elapsed };
          setResult({ kills: g.kills, time: carryRef.current.timeAcc, stage: g.stage });
          setScreen(g.stage >= STAGES.length - 1 ? "clear" : "stageclear");
        }
      }

      /* --- カメラ --- */
      const cx = WORLD_W > vw ? Math.max(0, Math.min(WORLD_W - vw, p.x - vw / 2)) : (WORLD_W - vw) / 2;
      const cy = Math.max(0, Math.min(WORLD_H - vh, p.y - vh * 0.55));
      g.cam.x += (cx - g.cam.x) * 0.12;
      g.cam.y += (cy - g.cam.y) * 0.12;
      if (g.shake > 0) g.shake *= 0.86;
    }

    /* ================= 描画 ================= */
    function drawLantern(x, y) {
      ctx.fillStyle = "#1b1826";
      ctx.fillRect(x - 5, y - 8, 10, 30);
      ctx.fillRect(x - 14, y - 18, 28, 12);
      ctx.beginPath(); ctx.moveTo(x - 18, y - 18); ctx.lineTo(x, y - 34); ctx.lineTo(x + 18, y - 18); ctx.closePath(); ctx.fill();
      const gl = ctx.createRadialGradient(x, y - 12, 1, x, y - 12, 26);
      gl.addColorStop(0, "rgba(139,224,200,0.5)"); gl.addColorStop(1, "rgba(139,224,200,0)");
      ctx.fillStyle = gl;
      ctx.beginPath(); ctx.arc(x, y - 12, 26, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#8be0c8";
      ctx.fillRect(x - 4, y - 15, 8, 6);
    }
    function drawDeco(d, t) {
      const s = d.s || 1;
      if (d.type === "lantern") return drawLantern(d.x, d.y);
      ctx.save(); ctx.translate(d.x, d.y); ctx.scale(s, s);
      if (d.type === "grave") {
        ctx.fillStyle = "#181523";
        ctx.fillRect(-10, -26, 20, 26); ctx.fillRect(-14, 0, 28, 6);
      } else if (d.type === "tree") {
        ctx.strokeStyle = "#15121f"; ctx.lineWidth = 5; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-4, -34); ctx.stroke();
        ctx.lineWidth = 3;

        ctx.strokeStyle = "rgba(90,70,50,0.4)"; ctx.lineWidth = 1.6;
